<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baker Cockpit</title>
<link rel="stylesheet" href="cockpit.css">
</head>
<body>
<header class="cockpit-header">
  <div class="tab brand">Brisen Lab</div>
  <div class="tab">Control Room</div>
  <div class="tab active">Cockpit</div>
  <div class="spacer"></div>
  <div class="conn" id="conn">connecting…</div>
</header>

<main class="wrap" id="wrap">
  <div id="grid"></div>
</main>

<!-- On-demand terminal overlay (mock interaction contract). -->
<div id="veil"></div>
<div id="term" role="dialog" aria-modal="true" aria-label="Live terminal">
  <div id="termbar">
    <div>
      <b id="term-title">terminal</b>
      <span class="sub">this is the REAL session — the native Terminal window mirrors it</span>
    </div>
    <div class="spacer"></div>
    <button class="btn go" id="term-go" type="button" title="Send Enter (answer GO)">GO ⏎</button>
    <div id="x" role="button" tabindex="0" aria-label="Close">✕</div>
  </div>
  <!-- iframe is injected on open and removed on close (no lingering connection). -->
  <div id="term-mount" style="flex:1; display:flex;"></div>
</div>

<div id="toast" hidden></div>

<script src="glance_state.js"></script>
<script src="cockpit.js"></script>
</body>
</html>
