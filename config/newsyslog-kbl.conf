# newsyslog config for KBL Mac Mini logs.
# Installed to /etc/newsyslog.d/kbl.conf by scripts/install_kbl_mac_mini.sh.
# Columns: filename mode count size(kb) when flags
#   mode  = octal perms
#   count = how many rotated copies to keep
#   size  = rotate when file exceeds this size in KB
#   when  = '*' means no time-based rotation
#   flags = J = bzip2 compress rotated files
/var/log/kbl/pipeline.log    644  7  10240  *  J
/var/log/kbl/gold-drain.log  644  7  10240  *  J
/var/log/kbl/heartbeat.log   644  7   1024  *  J
/var/log/kbl/purge.log       644  7   1024  *  J
