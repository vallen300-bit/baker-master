<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AO Dashboard — Structure Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Georgia&display=swap');
  :root {
    --bg: #0f1117;
    --col-bg: #1a1d27;
    --card-bg: #22253a;
    --border: #2a2d3a;
    --gold: #c9a96e;
    --gold-dim: rgba(201,169,110,0.15);
    --text: #e8e6e1;
    --text-dim: #8a8a8a;
    --text-bright: #fff;
    --red: #e74c3c;
    --green: #2ecc71;
    --blue: #3498db;
    --orange: #f39c12;
    --purple: #9b59b6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    padding: 20px;
    min-height: 100vh;
    touch-action: pan-y;
  }
  .header {
    text-align: center;
    padding: 20px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: Georgia, serif;
    font-size: 1.5em;
    color: var(--gold);
    font-weight: 400;
  }
  .header p { color: var(--text-dim); font-size: 0.8em; margin-top: 6px; }
  .legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    padding: 10px 0 16px;
    flex-wrap: wrap;
    font-size: 0.75em;
    color: var(--text-dim);
  }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  }
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--col-bg);
    color: var(--text-dim);
    font-size: 0.8em;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }
  .ctrl-btn.primary { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 600; }

  .board {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    align-items: start;
  }

  /* Columns */
  .column {
    background: var(--col-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    min-height: 120px;
    transition: border-color 0.2s, opacity 0.2s, transform 0.15s;
  }
  .column.drag-over { border-color: var(--gold); box-shadow: 0 0 20px rgba(201,169,110,0.2); }
  .column.col-dragging { opacity: 0.3; transform: scale(0.97); }
  .column.internal-only { border-style: dashed; }

  .col-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .col-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.8em; flex-shrink: 0;
    cursor: grab;
    transition: box-shadow 0.2s;
  }
  .col-num:hover { box-shadow: 0 0 8px rgba(201,169,110,0.3); }
  .col-num:active { cursor: grabbing; }
  .col-title {
    font-family: Georgia, serif;
    font-weight: 600;
    font-size: 0.95em;
    color: var(--gold);
    flex: 1;
  }
  .col-title[contenteditable]:focus {
    outline: 1px solid rgba(201,169,110,0.4);
    border-radius: 3px;
    background: rgba(201,169,110,0.1);
  }
  .col-count {
    font-size: 0.7em;
    color: var(--text-dim);
    background: rgba(255,255,255,0.05);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .col-vis {
    cursor: pointer;
    font-size: 1em;
    transition: opacity 0.2s;
    user-select: none;
    flex-shrink: 0;
  }
  .col-vis:hover { opacity: 0.8; }
  .col-vis.lp-visible { opacity: 1; }
  .col-vis.lp-hidden { opacity: 0.4; }
  .col-label {
    font-size: 0.6em;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .label-lp { background: rgba(46,204,113,0.15); color: var(--green); }
  .label-gp { background: rgba(231,76,60,0.15); color: var(--red); }

  .col-body { padding: 10px; min-height: 60px; }

  /* Items */
  .item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    user-select: none;
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .item.dragging { opacity: 0.3; transform: scale(0.95); }
  .item-grip {
    color: var(--text-dim);
    opacity: 0.3;
    font-size: 1em;
    cursor: grab;
    flex-shrink: 0;
    transition: opacity 0.2s, color 0.2s;
    line-height: 1;
    touch-action: none;
  }
  .item-grip:hover { opacity: 0.8; color: var(--gold); }
  .item-grip:active { cursor: grabbing; }
  .item-title {
    font-size: 0.82em;
    font-weight: 500;
    color: var(--text-bright);
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 0;
  }
  .item-title span[contenteditable] {
    cursor: text;
  }
  .item-title span[contenteditable]:focus {
    outline: 1px solid rgba(201,169,110,0.4);
    border-radius: 3px;
    background: rgba(201,169,110,0.1);
  }
  .item-remove {
    position: absolute;
    top: 6px; right: 8px;
    color: var(--text-dim);
    font-size: 0.9em;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .item:hover .item-remove { opacity: 0.6; }
  .item-remove:hover { opacity: 1 !important; color: var(--red); }

  .add-item-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    color: var(--text-dim);
    font-size: 0.78em;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .add-item-btn:hover { color: var(--gold); background: var(--gold-dim); }

  /* Expandable detail */
  .item { flex-wrap: wrap; cursor: pointer; }
  .item-detail {
    width: 100%;
    font-size: 0.72em;
    line-height: 1.5;
    color: var(--text-dim);
    padding: 8px 0 2px 24px;
    border-top: 1px solid rgba(255,255,255,0.04);
    margin-top: 6px;
    display: none;
    user-select: text;
  }
  .item.expanded .item-detail { display: block; }
  .item-expand-icon {
    font-size: 0.65em;
    color: var(--text-dim);
    transition: transform 0.2s, color 0.2s;
    flex-shrink: 0;
    margin-left: auto;
    padding: 0 2px;
  }
  .item.expanded .item-expand-icon { transform: rotate(90deg); color: var(--gold); }
  .item:hover .item-expand-icon { color: var(--gold); }

  /* Drop indicators */
  .drop-indicator {
    height: 3px;
    margin: -2px 0 6px;
    border-radius: 2px;
    background: var(--gold);
    box-shadow: 0 0 8px rgba(201,169,110,0.5);
    animation: dropPulse 0.8s ease-in-out infinite alternate;
  }
  @keyframes dropPulse {
    from { opacity: 0.6; }
    to { opacity: 1; }
  }

  .col-drop-indicator {
    position: absolute;
    top: 0; bottom: 0;
    width: 4px;
    background: var(--gold);
    border-radius: 2px;
    box-shadow: 0 0 12px rgba(201,169,110,0.6);
    animation: dropPulse 0.8s ease-in-out infinite alternate;
    z-index: 10;
    pointer-events: none;
  }

  /* Ghost clone (floating drag preview) */
  .drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.85;
    transform: rotate(2deg);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 2px var(--gold);
    border-radius: 8px;
    transition: none;
  }
  .drag-ghost-col {
    border-radius: 12px;
    transform: rotate(1deg) scale(0.95);
    max-width: 320px;
  }

  .add-col-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px dashed var(--border);
    border-radius: 12px;
    min-height: 120px;
    color: var(--text-dim);
    font-size: 0.85em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-col-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Color coding */
  .c-blue .col-num { background: rgba(52,152,219,0.2); color: var(--blue); }
  .c-gold .col-num { background: var(--gold-dim); color: var(--gold); }
  .c-red .col-num { background: rgba(231,76,60,0.2); color: var(--red); }
  .c-orange .col-num { background: rgba(243,156,18,0.2); color: var(--orange); }
  .c-green .col-num { background: rgba(46,204,113,0.2); color: var(--green); }
  .c-purple .col-num { background: rgba(155,89,182,0.2); color: var(--purple); }
  .c-dim .col-num { background: rgba(138,138,138,0.15); color: var(--text-dim); }

  #export-output {
    display: none;
    margin: 20px auto;
    max-width: 800px;
    background: var(--col-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  #export-output pre {
    font-size: 0.82em;
    color: var(--text);
    white-space: pre-wrap;
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    .board { grid-template-columns: 1fr; }
    body { padding: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>AO Dashboard — Structure Builder</h1>
  <p>GP view. Drag items by grip handle, columns by number badge. Click text to rename. Eye icon toggles LP visibility.</p>
</div>

<div class="legend">
  <span><div class="legend-dot" style="background:var(--green)"></div> LP-visible (can show AO)</span>
  <span><div class="legend-dot" style="background:var(--red)"></div> GP-only (internal)</span>
  <span>Dashed border = internal section</span>
</div>

<div class="controls">
  <button class="ctrl-btn" onclick="resetToDefault()">Reset</button>
  <button class="ctrl-btn" onclick="exportStructure()">Export</button>
  <button class="ctrl-btn primary" onclick="saveState()">Save</button>
</div>

<div class="board" id="board"></div>

<div id="export-output"><pre id="export-text"></pre><br><button class="ctrl-btn" onclick="document.getElementById('export-output').style.display='none'">Close</button></div>

let data = null;

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) { try { data = JSON.parse(saved); return; } catch(e) {} }
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveState() {
  data.columns = [];
  document.querySelectorAll('.column').forEach(col => {
    const d = {
      id: col.dataset.colId,
      title: col.querySelector('.col-title').textContent.trim(),
      color: col.dataset.color || 'c-dim',
      num: col.querySelector('.col-num')?.textContent?.trim() || '',
      lpVisible: col.dataset.lpVisible === 'true',
      items: []
    };
    col.querySelectorAll('.item').forEach(item => {
      const obj = {
        id: item.dataset.itemId,
        text: item.querySelector('.item-title span')?.textContent?.trim() || ''
      };
      const detailEl = item.querySelector('.item-detail');
      if (detailEl) obj.detail = detailEl.textContent.trim();
      else if (item.dataset.detail) obj.detail = item.dataset.detail;
      d.items.push(obj);
    });
    data.columns.push(d);
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  const btn = document.querySelector('.ctrl-btn.primary');
  btn.textContent = 'Saved \u2713';
  setTimeout(() => btn.textContent = 'Save', 1500);
}

function autoSave() { saveState(); }

function resetToDefault() {
  if (!confirm('Reset to default? Changes will be lost.')) return;
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  localStorage.removeItem(STORAGE_KEY);
  render();
}

// ===== POINTER-BASED DRAG ENGINE =====

let _drag = null; // active drag state

function startItemDrag(e, gripEl) {
  if (e.button !== 0 && e.pointerType === 'mouse') return;
  const itemEl = gripEl.closest('.item');
  if (!itemEl) return;
  e.preventDefault();
  try { gripEl.setPointerCapture(e.pointerId); } catch(_) {}

  _drag = {
    type: 'item',
    el: itemEl,
    pointerId: e.pointerId,
    startX: e.clientX,
    startY: e.clientY,
    active: false,
    ghost: null,
  };
}

function startColDrag(e, badgeEl) {
  if (e.button !== 0 && e.pointerType === 'mouse') return;
  const colEl = badgeEl.closest('.column');
  if (!colEl) return;
  e.preventDefault();
  try { badgeEl.setPointerCapture(e.pointerId); } catch(_) {}

  _drag = {
    type: 'column',
    el: colEl,
    pointerId: e.pointerId,
    startX: e.clientX,
    startY: e.clientY,
    active: false,
    ghost: null,
    lastSwap: 0,
  };
}

function onPointerMove(e) {
  if (!_drag || _drag.pointerId !== e.pointerId) return;

  const dx = e.clientX - _drag.startX;
  const dy = e.clientY - _drag.startY;

  // Check threshold
  if (!_drag.active) {
    if (Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;
    _drag.active = true;
    activateDrag(e);
  }

  // Move ghost
  if (_drag.ghost) {
    _drag.ghost.style.left = (e.clientX - _drag.ghostOffsetX) + 'px';
    _drag.ghost.style.top = (e.clientY - _drag.ghostOffsetY) + 'px';
  }

  if (_drag.type === 'item') updateItemDropTarget(e);
  else if (_drag.type === 'column') updateColDropTarget(e);
}

function activateDrag(e) {
  const rect = _drag.el.getBoundingClientRect();
  _drag.ghostOffsetX = e.clientX - rect.left;
  _drag.ghostOffsetY = e.clientY - rect.top;

  // Create ghost
  const ghost = _drag.el.cloneNode(true);
  ghost.style.width = rect.width + 'px';
  ghost.classList.add('drag-ghost');
  if (_drag.type === 'column') ghost.classList.add('drag-ghost-col');
  ghost.style.left = rect.left + 'px';
  ghost.style.top = rect.top + 'px';
  document.body.appendChild(ghost);
  _drag.ghost = ghost;

  // Dim original
  _drag.el.classList.add(_drag.type === 'item' ? 'dragging' : 'col-dragging');
}

function onPointerUp(e) {
  if (!_drag || _drag.pointerId !== e.pointerId) return;

  if (_drag.active) {
    if (_drag.type === 'item') finalizeItemDrop();
    else finalizeColDrop();
  }

  cleanup();
}

function onPointerCancel(e) {
  if (!_drag || _drag.pointerId !== e.pointerId) return;
  cleanup();
}

function cleanup() {
  if (!_drag) return;
  if (_drag.ghost) _drag.ghost.remove();
  if (_drag.el) {
    _drag.el.classList.remove('dragging', 'col-dragging');
  }
  clearIndicators();
  _drag = null;
}

function clearIndicators() {
  document.querySelectorAll('.drop-indicator, .col-drop-indicator').forEach(el => el.remove());
  document.querySelectorAll('.column.drag-over').forEach(c => c.classList.remove('drag-over'));
}

// ===== ITEM DROP LOGIC =====

function updateItemDropTarget(e) {
  clearIndicators();
  const target = getDropTarget(e.clientX, e.clientY);
  if (!target) return;

  target.colBody.closest('.column').classList.add('drag-over');

  const indicator = document.createElement('div');
  indicator.className = 'drop-indicator';

  if (target.afterEl) {
    target.colBody.insertBefore(indicator, target.afterEl);
  } else {
    const addBtn = target.colBody.querySelector('.add-item-btn');
    if (addBtn) target.colBody.insertBefore(indicator, addBtn);
    else target.colBody.appendChild(indicator);
  }
}

function getDropTarget(x, y) {
  // Find which col-body we're over
  const colBodies = document.querySelectorAll('.col-body');
  let target = null;
  for (const body of colBodies) {
    const rect = body.getBoundingClientRect();
    // Expand hit zone slightly for easier drops
    if (x >= rect.left - 10 && x <= rect.right + 10 &&
        y >= rect.top - 10 && y <= rect.bottom + 20) {
      target = body;
      break;
    }
  }
  if (!target) return null;

  const items = [...target.querySelectorAll('.item:not(.dragging)')];
  let afterEl = null;
  let closestOffset = -Infinity;
  for (const item of items) {
    const b = item.getBoundingClientRect();
    const off = y - b.top - b.height / 2;
    if (off < 0 && off > closestOffset) {
      closestOffset = off;
      afterEl = item;
    }
  }
  return { colBody: target, afterEl };
}

function finalizeItemDrop() {
  clearIndicators();
  const el = _drag.el;
  const ghost = _drag.ghost;
  if (!ghost) return;

  // Use ghost's center position for final target
  const gr = ghost.getBoundingClientRect();
  const cx = gr.left + gr.width / 2;
  const cy = gr.top + gr.height / 2;
  const target = getDropTarget(cx, cy);

  if (target) {
    if (target.afterEl) {
      target.colBody.insertBefore(el, target.afterEl);
    } else {
      const addBtn = target.colBody.querySelector('.add-item-btn');
      if (addBtn) target.colBody.insertBefore(el, addBtn);
      else target.colBody.appendChild(el);
    }
  }
  updateCounts();
  autoSave();
}

// ===== COLUMN DROP LOGIC =====

function updateColDropTarget(e) {
  clearIndicators();
  const board = document.getElementById('board');
  const cols = [...board.querySelectorAll('.column')];
  const dragIdx = cols.indexOf(_drag.el);

  // Find target column by pointer position
  let targetCol = null;
  for (const col of cols) {
    if (col === _drag.el) continue;
    const r = col.getBoundingClientRect();
    if (e.clientX >= r.left && e.clientX <= r.right &&
        e.clientY >= r.top && e.clientY <= r.bottom) {
      targetCol = col;
      break;
    }
  }
  if (!targetCol) return;

  // Throttle swaps
  const now = Date.now();
  if (now - _drag.lastSwap < 150) return;
  _drag.lastSwap = now;

  const targetIdx = cols.indexOf(targetCol);
  if (dragIdx < targetIdx) {
    const next = targetCol.nextElementSibling;
    if (next && !next.classList.contains('add-col-btn')) {
      board.insertBefore(_drag.el, next);
    } else {
      const addBtn = board.querySelector('.add-col-btn');
      if (addBtn) board.insertBefore(_drag.el, addBtn);
      else board.appendChild(_drag.el);
    }
  } else {
    board.insertBefore(_drag.el, targetCol);
  }
  renumberColumns();
}

function finalizeColDrop() {
  clearIndicators();
  renumberColumns();
  autoSave();
}

// ===== GLOBAL POINTER LISTENERS =====
document.addEventListener('pointermove', onPointerMove);
document.addEventListener('pointerup', onPointerUp);
document.addEventListener('pointercancel', onPointerCancel);

// Prevent native drag (safety net)
document.addEventListener('dragstart', e => {
  if (_drag) e.preventDefault();
});

// ===== RENDER =====

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  data.columns.forEach((col, ci) => {
    const colEl = document.createElement('div');
    colEl.className = `column ${col.color}${col.lpVisible ? '' : ' internal-only'}`;
    colEl.dataset.colId = col.id;
    colEl.dataset.color = col.color;
    colEl.dataset.lpVisible = col.lpVisible ? 'true' : 'false';
    const visIcon = col.lpVisible ? '\u{1F441}\uFE0F' : '\u{1F512}';
    const visClass = col.lpVisible ? 'lp-visible' : 'lp-hidden';
    const labelClass = col.lpVisible ? 'label-lp' : 'label-gp';
    const labelText = col.lpVisible ? 'LP' : 'GP';

    colEl.innerHTML = `
      <div class="col-header">
        <div class="col-num">${col.num || ci+1}</div>
        <div class="col-title" contenteditable="true">${esc(col.title)}</div>
        <span class="col-label ${labelClass}">${labelText}</span>
        <span class="col-vis ${visClass}" title="Toggle LP visibility">${visIcon}</span>
        <div class="col-count">${col.items.length}</div>
      </div>
      <div class="col-body" data-col-id="${col.id}"></div>
    `;

    // Column drag — from badge only
    const badge = colEl.querySelector('.col-num');
    badge.addEventListener('pointerdown', (e) => startColDrag(e, badge));

    // Visibility toggle
    const visEl = colEl.querySelector('.col-vis');
    visEl.addEventListener('click', (e) => { e.stopPropagation(); toggleVis(visEl); });

    // Title blur → auto-save
    const titleEl = colEl.querySelector('.col-title');
    titleEl.addEventListener('blur', () => autoSave());

    const body = colEl.querySelector('.col-body');
    col.items.forEach(item => body.appendChild(createItemEl(item)));

    const addBtn = document.createElement('div');
    addBtn.className = 'add-item-btn';
    addBtn.innerHTML = '<span style="font-size:1.1em;">+</span> Add item';
    addBtn.onclick = (e) => { e.stopPropagation(); addNewItem(body); };
    body.appendChild(addBtn);

    board.appendChild(colEl);
  });

  // Add column button
  const addCol = document.createElement('div');
  addCol.className = 'add-col-btn';
  addCol.innerHTML = '+ Add Section';
  addCol.onclick = addNewColumn;
  board.appendChild(addCol);
}

function createItemEl(item) {
  const el = document.createElement('div');
  el.className = 'item';
  el.dataset.itemId = item.id;
  if (item.detail) el.dataset.detail = item.detail;
  const hasDetail = item.detail && item.detail.trim().length > 0;
  el.innerHTML = `
    <span class="item-grip">\u2807</span>
    <div class="item-title"><span contenteditable="true">${esc(item.text)}</span></div>
    ${hasDetail ? '<span class="item-expand-icon">\u25B6</span>' : ''}
    <span class="item-remove">&times;</span>
    ${hasDetail ? '<div class="item-detail">' + esc(item.detail) + '</div>' : ''}
  `;

  // Drag from grip only
  const grip = el.querySelector('.item-grip');
  grip.addEventListener('pointerdown', (e) => startItemDrag(e, grip));

  // Click to expand/collapse (but not on grip, remove, or contenteditable)
  el.addEventListener('click', (e) => {
    if (e.target.closest('.item-grip') || e.target.closest('.item-remove') ||
        e.target.isContentEditable || e.target.closest('[contenteditable]')) return;
    if (!el.querySelector('.item-detail')) return;
    el.classList.toggle('expanded');
  });

  // Remove button
  el.querySelector('.item-remove').addEventListener('click', (e) => {
    e.stopPropagation();
    removeItem(el);
  });

  // Text blur → auto-save
  el.querySelector('.item-title span').addEventListener('blur', () => autoSave());

  return el;
}

function toggleVis(el) {
  const col = el.closest('.column');
  const isVis = col.dataset.lpVisible === 'true';
  col.dataset.lpVisible = isVis ? 'false' : 'true';
  el.textContent = isVis ? '\u{1F512}' : '\u{1F441}\uFE0F';
  el.className = `col-vis ${isVis ? 'lp-hidden' : 'lp-visible'}`;
  const label = col.querySelector('.col-label');
  label.className = `col-label ${isVis ? 'label-gp' : 'label-lp'}`;
  label.textContent = isVis ? 'GP' : 'LP';
  col.classList.toggle('internal-only', isVis);
  autoSave();
}

function addNewItem(body) {
  const text = prompt('New item:');
  if (!text) return;
  const item = { id: 'n' + Date.now(), text: '\u{1F4CC} ' + text };
  const el = createItemEl(item);
  body.insertBefore(el, body.querySelector('.add-item-btn'));
  updateCounts();
  autoSave();
}

function addNewColumn() {
  const title = prompt('Section title:');
  if (!title) return;
  data.columns.push({
    id: 'col' + Date.now(), title, color: 'c-dim',
    num: String(data.columns.length + 1), lpVisible: false, items: []
  });
  render();
  autoSave();
}

function removeItem(itemEl) {
  itemEl.style.opacity = '0'; itemEl.style.transform = 'scale(0.9)';
  itemEl.style.transition = 'all 0.2s';
  setTimeout(() => { itemEl.remove(); updateCounts(); autoSave(); }, 200);
}

function renumberColumns() {
  document.querySelectorAll('.column').forEach((col, i) => {
    const num = col.querySelector('.col-num');
    if (num) num.textContent = i + 1;
  });
}

function updateCounts() {
  document.querySelectorAll('.column').forEach(col => {
    const c = col.querySelectorAll('.item').length;
    const el = col.querySelector('.col-count');
    if (el) el.textContent = c;
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function exportStructure() {
  let t = 'AO DASHBOARD \u2014 GP VIEW\n' + '\u2550'.repeat(40) + '\n\n';
  document.querySelectorAll('.column').forEach(col => {
    const num = col.querySelector('.col-num')?.textContent || '';
    const title = col.querySelector('.col-title')?.textContent?.trim() || '';
    const vis = col.dataset.lpVisible === 'true' ? '[LP-visible]' : '[GP-only]';
    t += `${num}. ${title.toUpperCase()} ${vis}\n`;
    col.querySelectorAll('.item').forEach(item => {
      const tx = item.querySelector('.item-title span')?.textContent?.trim() || '';
      t += `   \u251C\u2500\u2500 ${tx}\n`;
    });
    t += '\n';
  });
  document.getElementById('export-text').textContent = t;
  document.getElementById('export-output').style.display = 'block';
  document.getElementById('export-output').scrollIntoView({ behavior: 'smooth' });
}

// Migration: add new consequence columns if not in saved state
function migrateData() {
  if (!data || !data.columns) return;
  const ids = data.columns.map(c => c.id);
  // Rename old 'consequences' to 'risks'
  const oldCon = data.columns.find(c => c.id === 'consequences');
  if (oldCon) { oldCon.id = 'risks'; oldCon.title = 'Risks'; }
  // Add RG7 consequences if missing
  if (!ids.includes('conseq_rg7')) {
    const newRG7 = DEFAULT_DATA.columns.find(c => c.id === 'conseq_rg7');
    if (newRG7) {
      const risksIdx = data.columns.findIndex(c => c.id === 'risks');
      data.columns.splice(risksIdx >= 0 ? risksIdx + 1 : data.columns.length, 0, JSON.parse(JSON.stringify(newRG7)));
    }
  }
  // Add AO consequences if missing
  if (!ids.includes('conseq_ao')) {
    const newAO = DEFAULT_DATA.columns.find(c => c.id === 'conseq_ao');
    if (newAO) {
      const rg7Idx = data.columns.findIndex(c => c.id === 'conseq_rg7');
      data.columns.splice(rg7Idx >= 0 ? rg7Idx + 1 : data.columns.length, 0, JSON.parse(JSON.stringify(newAO)));
    }
  }
  // Inject details into existing items that lack them
  const defaultMap = {};
  DEFAULT_DATA.columns.forEach(c => c.items.forEach(it => { if (it.detail) defaultMap[it.id] = it.detail; }));
  data.columns.forEach(c => c.items.forEach(it => {
    if (!it.detail && defaultMap[it.id]) it.detail = defaultMap[it.id];
  }));
  // Renumber
  data.columns.forEach((c, i) => c.num = String(i + 1));
}

loadData();
migrateData();
render();
autoSave();
</script>
