<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hotel — NVIDIA × Mandarin Oriental × Brisen</title>
<style>
  :root{
    --bg:#f7f6f2; --panel:#efeee8; --card:#ffffff; --card-hover:#faf9f5;
    --line:#ddd8ce; --line-2:#ece8de;
    --text:#171717; --text-2:#54524c; --muted:#767168; --faint:#9b958b;
    --accent:#1d1d1d; --accent-weak:rgba(29,29,29,.08); --accent-line:rgba(29,29,29,.22);
    --id-blue:#0969da; --id-blue-weak:rgba(9,105,218,.10); --id-blue-line:rgba(9,105,218,.34);
    --amber:#b7791f; --amber-weak:rgba(183,121,31,.12); --amber-line:rgba(183,121,31,.32);
    --green:#4c8f2f; --green-weak:rgba(76,143,47,.13); --green-line:rgba(76,143,47,.32);
    --shadow:0 18px 36px rgba(31,28,20,.12), 0 4px 10px rgba(31,28,20,.08), inset 0 1px 0 rgba(255,255,255,.72);
    --shadow-hover:0 24px 46px rgba(31,28,20,.15), 0 6px 14px rgba(31,28,20,.10), inset 0 1px 0 rgba(255,255,255,.82);
    --overlay:rgba(23,23,23,.28);
    --mark-fg:#ffffff;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --sbw:250px;
  }
  body[data-theme="dark"]{
    --bg:#0d1117; --panel:#10151c; --card:#161b22; --card-hover:#1c232d;
    --line:#2a3240; --line-2:#202733;
    --text:#e8eef4; --text-2:#aeb8c2; --muted:#8b949e; --faint:#626b77;
    --accent:#f0f4f8; --accent-weak:rgba(240,244,248,.1); --accent-line:rgba(240,244,248,.28);
    --id-blue:#58a6ff; --id-blue-weak:rgba(56,139,253,.12); --id-blue-line:rgba(56,139,253,.45);
    --amber:#e3a93a; --amber-weak:rgba(227,169,58,.13); --amber-line:rgba(227,169,58,.34);
    --green:#76b900; --green-weak:rgba(118,185,0,.14); --green-line:rgba(118,185,0,.36);
    --shadow:inset 0 1.5px 0 rgba(255,255,255,.11), inset 0 -3px 4px rgba(0,0,0,.42), 0 8px 18px rgba(0,0,0,.55);
    --shadow-hover:inset 0 1.5px 0 rgba(255,255,255,.15), inset 0 -3px 4px rgba(0,0,0,.48), 0 12px 28px rgba(0,0,0,.66);
    --overlay:rgba(0,0,0,.6);
    --mark-fg:#0d1117;
  }
  *{box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.55;transition:background .16s,color .16s}
  svg{display:block}
  .app{position:relative;display:grid;grid-template-columns:var(--sbw) 1fr;min-height:100vh}

  .resizer{position:absolute;top:0;bottom:0;left:var(--sbw);width:9px;margin-left:-4px;cursor:col-resize;z-index:50;background:none;border:none;padding:0}
  .resizer span{position:absolute;left:3px;top:0;bottom:0;width:2px;background:transparent;transition:background .12s}
  .resizer:hover span,.resizer.drag span,.resizer:focus-visible span{background:var(--accent)}

  .sidebar{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{padding:20px 18px 14px;display:flex;align-items:center;gap:11px}
  .brand .mark{width:30px;height:30px;border-radius:8px;background:var(--accent);color:var(--mark-fg);display:grid;place-items:center;flex:0 0 auto}
  .brand .mark svg{width:17px;height:17px;stroke-width:2}
  .brand .name{font-weight:600;font-size:15px;letter-spacing:0}
  .brand .sub{font-size:10.5px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
  .search{margin:6px 14px 8px;position:relative}
  .search input{width:100%;padding:9px 10px 9px 32px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
  .search input::placeholder{color:var(--muted)}
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
  .search .mag{position:absolute;left:10px;top:9px;color:var(--muted);width:15px;height:15px}
  .navlabel{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--faint);padding:16px 20px 8px;font-weight:700;font-family:var(--mono)}
  button.navitem{font:inherit;border:none;background:none;text-align:left}
  .navitem{display:flex;align-items:center;gap:11px;width:calc(100% - 16px);padding:9px 12px;margin:2px 8px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--text-2);position:relative}
  .navitem:hover{background:var(--card);color:var(--text)}
  .navitem .ic{width:17px;height:17px;color:var(--muted);flex:none}
  .navitem .ic svg{width:17px;height:17px;stroke-width:1.7}
  .navitem.active{background:var(--accent-weak);color:var(--accent)}
  .navitem.active .ic{color:var(--accent)}
  .navitem.active::before{content:"";position:absolute;left:-8px;top:8px;bottom:8px;width:3px;border-radius:2px;background:var(--accent)}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:8px}
  .sb-foot{margin-top:auto;padding:14px 20px 20px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px;font-family:var(--mono)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-weak)}

  .main{padding:44px 48px 90px;max-width:1000px}
  .kicker{display:inline-flex;align-items:center;width:max-content;font:700 11px/1 var(--mono);color:var(--id-blue);background:var(--id-blue-weak);border:1px solid var(--id-blue-line);border-radius:5px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.14em;padding:5px 8px}
  h1.sec{font-size:26px;line-height:1.18;margin:0 0 9px;letter-spacing:0;font-weight:650}
  .sec-sub{color:var(--muted);font-size:14px;margin-bottom:24px;max-width:72ch;line-height:1.6}
  .thesis-lead{font-size:17px;line-height:1.5;font-weight:600;color:var(--text);margin:0 0 18px;max-width:74ch;letter-spacing:0}
  .main{width:100%}
  .main-top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin:0 0 28px;padding-bottom:18px;border-bottom:1px solid var(--line)}
  .draft-line{display:flex;align-items:center;gap:9px;color:var(--muted);font:600 11px/1 var(--mono);text-transform:uppercase;letter-spacing:.08em}
  .theme-toggle{display:inline-flex;align-items:center;gap:3px;padding:3px;border:1px solid var(--line);border-radius:999px;background:var(--card);box-shadow:0 1px 0 rgba(0,0,0,.02)}
  .theme-toggle button{font:700 11px/1 var(--mono);border:0;border-radius:999px;background:transparent;color:var(--muted);padding:8px 11px;min-width:56px;cursor:pointer}
  .theme-toggle button:hover{color:var(--text);background:var(--card-hover)}
  .theme-toggle button[aria-pressed="true"]{background:var(--accent);color:var(--mark-fg)}
  .project-state{display:grid;grid-template-columns:1.35fr repeat(3,1fr);gap:12px;margin:0 0 24px}
  .state-card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px 15px;box-shadow:var(--shadow);transition:border-color .14s,box-shadow .14s,transform .14s}
  .state-card:hover{border-color:var(--id-blue-line);box-shadow:var(--shadow-hover);transform:translateY(-1px)}
  .state-card .label{display:inline-flex;width:max-content;font:700 10px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--id-blue);background:var(--id-blue-weak);border:1px solid var(--id-blue-line);border-radius:5px;margin-bottom:10px;padding:4px 7px}
  .state-card .value{font-size:13px;line-height:1.45;color:var(--text-2)}
  .state-card.primary .value{font-size:14px;color:var(--text);font-weight:600}
  .legend{display:flex;gap:20px;flex-wrap:wrap;margin:0 0 28px;font-size:12.5px;color:var(--muted)}
  .legend .lr{display:flex;align-items:center;gap:8px}
  .legend .sw{width:15px;height:15px;border-radius:5px}
  .legend .sw.g{background:var(--amber)} .legend .sw.t{background:var(--green)}

  .cards{display:flex;flex-direction:column;gap:16px}
  .scard{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:20px 22px 20px;box-shadow:var(--shadow);transition:border-color .14s,box-shadow .14s,transform .14s}
  .scard:hover{border-color:var(--id-blue-line);box-shadow:var(--shadow-hover);transform:translateY(-1px)}
  .shead{display:flex;align-items:baseline;gap:11px;margin-bottom:16px}
  .sidx{font:700 12px/1 var(--mono);color:var(--faint)}
  .sname{font-size:18px;font-weight:600;letter-spacing:0}
  .srole{font:500 11.5px/1 var(--mono);color:var(--faint);margin-left:auto;white-space:nowrap}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:34px}
  .col h4{font:700 10px/1 var(--mono);letter-spacing:.13em;text-transform:uppercase;margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .col h4 .chip{width:8px;height:8px;border-radius:2px}
  .col.gives h4{color:var(--amber)} .col.gives h4 .chip{background:var(--amber)}
  .col.gets h4{color:var(--green)} .col.gets h4 .chip{background:var(--green)}
  .items{display:flex;flex-direction:column;gap:3px}
  button.item{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;font:inherit;color:var(--text-2);background:none;border:1px solid transparent;border-radius:9px;padding:8px 10px;cursor:pointer;line-height:1.42;font-size:14px}
  .item:hover{background:var(--card-hover);border-color:var(--line)}
  .item .num{flex:0 0 auto;width:20px;height:20px;border-radius:6px;font:700 10px/20px var(--mono);text-align:center}
  .item.gives .num{background:var(--amber-weak);color:var(--amber);border:1px solid var(--amber-line)}
  .item.gets .num{background:var(--green-weak);color:var(--green);border:1px solid var(--green-line)}
  .item.gives.top .num{background:var(--amber);color:var(--mark-fg);border-color:var(--amber)}
  .item.gets.top .num{background:var(--green);color:var(--mark-fg);border-color:var(--green)}
  .item .itx{flex:1 1 auto;padding-top:1px}
  .item.top .itx{color:var(--text);font-weight:600}
  .item .chev{flex:0 0 auto;width:14px;height:14px;color:var(--faint);opacity:0;transition:opacity .12s;margin-top:3px}
  .item:hover .chev{opacity:.75}
  .item .chev svg{width:14px;height:14px;stroke-width:2}
  .snote{margin-top:18px;padding-top:14px;border-top:1px solid var(--line-2);font-size:12.5px;color:var(--muted);line-height:1.55}
  .snote b{color:var(--text-2);font-weight:600}

  /* AI Hotel area cards */
  .context{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:16px 18px;margin-bottom:26px;font-size:13.5px;color:var(--text-2);line-height:1.6;max-width:78ch;box-shadow:var(--shadow)}
  .context b{color:var(--text);font-weight:600}
  .agrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  button.acard{font:inherit;text-align:left;color:inherit}
  .acard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px 52px 20px 20px;cursor:pointer;transition:border-color .14s,background .14s,transform .14s;display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .acard:hover{border-color:var(--id-blue-line);background:var(--card-hover);transform:translateY(-1px);box-shadow:var(--shadow-hover)}
  .ahead{display:flex;align-items:center;gap:12px;margin-bottom:11px}
  .atile{width:38px;height:38px;border-radius:10px;background:var(--bg);border:1px solid var(--line);display:grid;place-items:center;color:var(--text-2);flex:0 0 auto}
  .atile svg{width:19px;height:19px;stroke-width:1.7}
  .aname{font-size:15.5px;font-weight:600;letter-spacing:0;color:var(--amber)}
  .ablurb{font-size:13px;color:var(--text-2);line-height:1.55;margin-bottom:14px;flex:1 1 auto}
  .achips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:11px}
  .ca{font:600 10px/1 var(--mono);padding:4px 8px;border-radius:6px;background:var(--bg);border:1px solid var(--line);color:var(--muted)}
  .ca b{color:var(--text-2);font-weight:700}
  .averdict{font-size:12px;color:var(--accent);display:flex;align-items:center;gap:7px}
  .averdict .vt{width:5px;height:5px;border-radius:50%;background:var(--accent);flex:0 0 auto}
  .card-dots{position:absolute;right:14px;top:14px;color:var(--faint);font:700 18px/1 var(--mono);letter-spacing:1px;padding:3px 7px;border-radius:5px;transition:color .12s,background .12s}
  .acard:hover .card-dots{color:var(--text);background:var(--accent-weak)}

  /* library cards (Research / Communications) */
  .rgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px 20px;display:flex;flex-direction:column;transition:border-color .14s,background .14s;box-shadow:var(--shadow)}
  .rcard:hover{border-color:var(--id-blue-line);background:var(--card-hover);box-shadow:var(--shadow-hover)}
  .rtop{display:flex;align-items:center;gap:11px;margin-bottom:9px}
  .rti{width:34px;height:34px;border-radius:9px;background:var(--bg);border:1px solid var(--line);display:grid;place-items:center;color:var(--text-2);flex:0 0 auto}
  .rti svg{width:17px;height:17px;stroke-width:1.7}
  a.rtitle,span.rtitle{font-size:15.5px;font-weight:600;color:var(--text);text-decoration:none;letter-spacing:0}
  a.rtitle:hover{color:var(--accent)}
  .rstatus{margin-left:auto;font:700 9px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:6px;flex:0 0 auto}
  .rstatus.live{background:var(--green-weak);color:var(--green)}
  .rstatus.soon{background:var(--bg);color:var(--faint);border:1px solid var(--line)}
  .rmeta{font:500 11px/1.3 var(--mono);color:var(--faint);margin-bottom:11px}
  .rdesc{font-size:13px;color:var(--text-2);line-height:1.55;margin-bottom:15px;flex:1 1 auto}
  .rfoot{display:flex;align-items:center;gap:8px}
  a.rlink{display:inline-flex;align-items:center;gap:7px;font:600 12.5px/1 var(--sans);color:var(--accent);text-decoration:none;border:1px solid var(--accent-line);background:var(--accent-weak);padding:8px 13px;border-radius:8px}
  a.rlink:hover{background:var(--card-hover)}
  a.rlink .lic{display:flex} a.rlink .lic svg{width:13px;height:13px;stroke-width:2}
  span.rlink{display:inline-flex;align-items:center;gap:7px;font:600 12.5px/1 var(--sans);color:var(--accent);border:1px solid var(--accent-line);background:var(--accent-weak);padding:8px 13px;border-radius:8px}
  span.rlink .lic{display:flex} span.rlink .lic svg{width:13px;height:13px;stroke-width:2}
  .rsoon{font:600 11px/1 var(--mono);color:var(--faint);border:1px solid var(--line);padding:8px 12px;border-radius:8px}

  /* Field notes (live captures from the phone) */
  .ngrid{display:flex;flex-direction:column;gap:14px}
  .ncard{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px 18px;display:flex;gap:14px;box-shadow:var(--shadow);transition:border-color .14s,box-shadow .14s}
  .ncard:hover{border-color:var(--id-blue-line);box-shadow:var(--shadow-hover)}
  .nthumb{width:64px;height:64px;border-radius:8px;object-fit:cover;border:1px solid var(--line);flex:0 0 auto;background:var(--bg)}
  .nthumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .nthumbs img{width:44px;height:44px;border-radius:6px;object-fit:cover;border:1px solid var(--line);background:var(--bg)}
  .nbody{flex:1 1 auto;min-width:0}
  .nsmry{font-size:14.5px;color:var(--text);line-height:1.5;margin-bottom:10px;word-wrap:break-word}
  .nmeta{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .ntag{font:700 10px/1 var(--mono);letter-spacing:.04em;text-transform:uppercase;padding:4px 8px;border-radius:6px}
  .ntag.use_case{background:var(--amber-weak);color:var(--amber);border:1px solid var(--amber-line)}
  .ntag.stakeholder{background:var(--green-weak);color:var(--green);border:1px solid var(--green-line)}
  .ntag.research{background:var(--id-blue-weak);color:var(--id-blue);border:1px solid var(--id-blue-line)}
  .ntag.comms{background:var(--accent-weak);color:var(--accent);border:1px solid var(--accent-line)}
  .ntag.general{background:var(--bg);color:var(--muted);border:1px solid var(--line)}
  .nrel{font:600 11px/1 var(--mono);color:var(--text-2)}
  .ntime{font:500 11px/1 var(--mono);color:var(--faint);margin-left:auto}
  .nempty{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:22px;text-align:center;color:var(--muted);font-size:14px;box-shadow:var(--shadow)}

  .pf-flag{display:inline-block;font:700 10px/1 var(--mono);color:var(--amber);background:var(--amber-weak);border:1px solid var(--amber-line);border-radius:5px;padding:5px 9px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:16px}
  .pf-lead{font-size:15.5px;line-height:1.55;color:var(--text);margin-bottom:24px;max-width:72ch}
  .pf-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:24px}
  .pf-card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px 18px 20px;box-shadow:var(--shadow)}
  .pf-tile{width:34px;height:34px;border-radius:9px;background:var(--amber-weak);border:1px solid var(--amber-line);display:grid;place-items:center;color:var(--amber);font:700 15px/1 var(--mono);margin-bottom:12px}
  .pf-name{font-size:15.5px;font-weight:600;color:var(--amber);margin-bottom:6px}
  .pf-blurb{font-size:13px;color:var(--text-2);line-height:1.55}
  .pf-val{border-top:1px solid var(--line);padding-top:18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px}
  .pf-vlabel{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px}
  .pf-vdesc{font-size:12.5px;color:var(--muted);line-height:1.45}
  .dummy{}
  dialog{border:1px solid var(--line);border-radius:12px;padding:0;max-width:620px;width:92%;background:var(--card);color:var(--text);box-shadow:var(--shadow)}
  dialog::backdrop{background:var(--overlay)}
  .dlg-head{padding:20px 24px 16px;border-bottom:1px solid var(--line);position:relative}
  .dlg-tag{display:inline-block;font:700 10px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;border-radius:6px;margin-bottom:11px}
  .dlg-tag.gives{background:var(--amber-weak);color:var(--amber)} .dlg-tag.gets{background:var(--green-weak);color:var(--green)} .dlg-tag.area{background:var(--accent-weak);color:var(--accent)}
  .dlg-head h2{margin:0;font-size:19px;font-weight:620;letter-spacing:0}
  .dlg-head .who{font:500 11.5px/1 var(--mono);color:var(--muted);margin-top:7px}
  .dlg-head .x{position:absolute;top:18px;right:20px;background:none;border:none;cursor:pointer;color:var(--muted);width:22px;height:22px;padding:0}
  .dlg-head .x:hover{color:var(--text)}
  .dlg-body{padding:18px 24px 26px;max-height:64vh;overflow-y:auto}
  .dlg-body .lead{font-size:14.5px;color:var(--text-2);line-height:1.65;margin:0 0 18px}
  .dlg-h{font:700 10px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:0 0 11px}
  .exlist{display:flex;flex-direction:column;gap:9px;margin:0 0 18px;padding:0;list-style:none}
  .exlist li{display:flex;gap:10px;font-size:13.5px;color:var(--text-2);line-height:1.5}
  .exlist li::before{content:"";flex:0 0 auto;width:6px;height:6px;border-radius:2px;background:var(--accent);margin-top:7px}
  .assess{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .assess .a{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
  .assess .a .k{font:700 9px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:5px}
  .assess .a .v{font-size:13px;color:var(--text);line-height:1.4}

  .hide{display:none!important}
  .topbar{display:none;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:30}
  .topbar .tb-left{display:flex;align-items:center;gap:12px;min-width:0}
  .topbar .mb{background:var(--card);border:1px solid var(--line);border-radius:8px;width:38px;height:38px;display:grid;place-items:center;cursor:pointer;color:var(--text);padding:0}

  {co:'Hudini',icon:'message',person:'Booth demo — in-room guest tablet',area:'Guest service — concierge & reservations',fit:'High fit',
   what:'A guest-facing in-room tablet and kiosk that becomes the hotel’s digital concierge. From the room, a guest orders in-room dining (the order prints straight to the kitchen), books the restaurant or spa, calls housekeeping, and chats with concierge — all on one screen, across many connected vendors.',

   dossier:'Hudini is a guest-experience and operations platform for luxury and upscale hotels (operated by Mankara Technologies; US / Middle East / APAC presence), in business since roughly 2018–2019. Its omnichannel suite — mobile app, in-room tablet, kiosk, IPTV and messaging — covers contactless check-in, room controls, dining, service requests and upselling, with 100+ integrations to existing hotel systems. It already runs AI: “Hudini AI” does intent-based guest messaging, automated request routing and AI-driven upselling. Live in production at Royal Mansour Marrakech, Atlantis Dubai, The Biltmore Dubai and SH Hotels & Resorts. The Mandarin Oriental Dubai rollout heard on the floor is not yet confirmed in public sources.',

   why:'Speaks directly to Brisen’s hotel-development business, not just hospitality operations — the construction-budgeting side is a rare find. Bruce is in the Hospitality Technology Hall of Fame.',

  {co:'RoomPriceGenie',icon:'sliders',person:'Nuha Pancras — Sales & Revenue Manager (+ Mike)',area:'Operations & personalization (revenue)',fit:'Swiss vendor',
   what:'Automated revenue management. It layers on top of the systems a hotel already runs (Opera PMS, Lighthouse), reads market demand, how fast rooms are selling and occupancy, recommends a price, then pushes the new price back into the PMS automatically. It carries its own data API, so a hotel does not need its own separate Lighthouse subscription.',

   dossier:'RoomPriceGenie (RoomPriceGenie GmbH) is a Swiss revenue-management vendor headquartered in Steinhausen, Canton Zug, operating since 2017 (founded by a former hedge-fund quant). Its cloud software automates dynamic room pricing for mainly independent hotels and small groups: it layers on the existing PMS/channel stack (90+ integrations — Mews, SiteMinder, Opera), reads demand and competitor rates, and pushes new prices automatically up to 24× a day. Pricing is AI / algorithm-driven (supply-demand plus competitor-rate model). In production at 4,000+ hotels worldwide, backed by a $75M growth round. Note: the base skews independent/budget — no named luxury customers surfaced, so the luxury fit is unproven.',

   why:'Perimeter security and parking/licence-plate monitoring for a property, with a human in the loop so guests aren’t hit with false alarms.',
   dossier:'American Sentinel (amsentinel.com) is a US property-security vendor founded 2024, based in the Pharr / McAllen area of south Texas. It deploys solar-powered mobile surveillance towers — 360° PTZ cameras, two-way speak-down audio, floodlights and a cloud video-management system — backed by a 24/7 human monitoring service. It already uses AI: AI threat/object detection plus licence-plate and face recognition trigger alerts that a human centre verifies before dispatch. Documented use is in construction, warehousing, storage and corporate campuses; no hotel, resort or hospitality deployment is named anywhere, so hospitality use is unproven. A young company — useful for perimeter and parking security, but ask for references.',

/* ---- field notes (live captures from the phone) ---- */
const NOTE_SECTION_LABELS={use_case:'Use case',stakeholder:'Stakeholder',research:'Research',comms:'Comms',general:'General'};
function noteSection(s){return (s in NOTE_SECTION_LABELS)?s:'general';}
function fmtNoteTime(iso){
  if(!iso)return '';
  const d=new Date(iso);if(isNaN(d.getTime()))return '';
  try{return d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
  catch(e){return String(iso).slice(0,16);}
}
function renderNotes(main){
  main.appendChild(el('div','kicker','From the floor'));
  main.appendChild(el('h1','sec','Field notes'));
  main.appendChild(el('div','sec-sub','Photos and notes captured on the phone, sorted automatically. Newest first. Read-only here — capture happens from the phone bookmark.'));
  const key=new URLSearchParams(location.search).get('key');
  if(!key){
    main.appendChild(el('div','nempty','Open this dashboard with your access key in the link (?key=…) to load field notes.'));
    return;
  }
  const wrap=el('div','ngrid');main.appendChild(wrap);
  wrap.appendChild(el('div','nempty','Loading field notes…'));
  fetch('/api/ai-hotel/captures?limit=100',{headers:{'X-Baker-Key':key}})
    .then(r=>r.json())
    .then(data=>{
      while(wrap.firstChild)wrap.removeChild(wrap.firstChild);
      const caps=(data&&Array.isArray(data.captures))?data.captures:[];
      if(!caps.length){wrap.appendChild(el('div','nempty','No field notes yet. Snap or dictate one from the capture page.'));return;}
      caps.forEach(c=>{
        const card=el('div','ncard');
        // images[] is the upgraded multi-photo field; fall back to the legacy
        // single image for any pre-upgrade capture.
        const imgs=(Array.isArray(c.images)&&c.images.length)?c.images:(c.image?[c.image]:[]);
        if(imgs.length){const img=document.createElement('img');img.className='nthumb';img.src=imgs[0];img.alt='Field photo';img.loading='lazy';card.appendChild(img);}
        const body=el('div','nbody');
        body.appendChild(el('div','nsmry',c.summary||'(no summary)'));
        const meta=el('div','nmeta');
        const sec=noteSection(c.section_guess);
        meta.appendChild(el('span','ntag '+sec,NOTE_SECTION_LABELS[sec]));
        if(c.related_area)meta.appendChild(el('span','nrel',c.related_area));
        meta.appendChild(el('span','ntime',fmtNoteTime(c.created_at)));
        body.appendChild(meta);
        if(imgs.length>1){
          const strip=el('div','nthumbs');
          imgs.slice(1).forEach(src=>{const t=document.createElement('img');t.src=src;t.alt='Field photo';t.loading='lazy';strip.appendChild(t);});
          body.appendChild(strip);
        }
        card.appendChild(body);wrap.appendChild(card);
      });
    })
    .catch(()=>{
      while(wrap.firstChild)wrap.removeChild(wrap.firstChild);
      wrap.appendChild(el('div','nempty','Could not load field notes. Check your key and connection.'));
    });
}
