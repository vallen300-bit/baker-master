<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- build: AI_HOTEL_DASHBOARD_V7_RESTRUCTURE_1 (13-section external presentation spine: grouped nav Narrative/Case/Execution/Evidence, one declarative SECTIONS model + reusable presentation-section renderer, Pattern-B first-screen status strip, visible empty-states. §13 Field Notes preserved 100% — renderNotes untouched: lightbox+rotate, soft-delete, research-findings, audio/video, GPS, PIN/key auth). Served no-cache (#382) — self-contained, no ?v= sub-asset. -->
<title>AI Hotel — NVIDIA × Mandarin Oriental × Brisen</title>
<style>
  :root{
    --bg:#f7f6f2; --panel:#efeee8; --card:#ffffff; --card-hover:#faf9f5;
    --line:#ddd8ce; --line-2:#ece8de;
    --text:#171717; --text-2:#54524c; --muted:#767168; --faint:#9b958b;
    --accent:#1d1d1d; --accent-weak:rgba(29,29,29,.08); --accent-line:rgba(29,29,29,.22);
    --id-blue:#0969da; --id-blue-weak:rgba(9,105,218,.10); --id-blue-line:rgba(9,105,218,.34);
    --amber:#b7791f; --amber-weak:rgba(183,121,31,.12); --amber-line:rgba(183,121,31,.32);
    --green:#4c8f2f; --green-weak:rgba(76,143,47,.13); --green-line:rgba(76,143,47,.32);
    --shadow:0 18px 36px rgba(31,28,20,.12), 0 4px 10px rgba(31,28,20,.08), inset 0 1px 0 rgba(255,255,255,.72);
    --shadow-hover:0 24px 46px rgba(31,28,20,.15), 0 6px 14px rgba(31,28,20,.10), inset 0 1px 0 rgba(255,255,255,.82);
    --overlay:rgba(23,23,23,.28);
    --mark-fg:#ffffff;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --sbw:250px;
  }
  body[data-theme="dark"]{
    --bg:#0d1117; --panel:#10151c; --card:#161b22; --card-hover:#1c232d;
    --line:#2a3240; --line-2:#202733;
    --text:#e8eef4; --text-2:#aeb8c2; --muted:#8b949e; --faint:#626b77;
    --accent:#f0f4f8; --accent-weak:rgba(240,244,248,.1); --accent-line:rgba(240,244,248,.28);
    --id-blue:#58a6ff; --id-blue-weak:rgba(56,139,253,.12); --id-blue-line:rgba(56,139,253,.45);
    --amber:#e3a93a; --amber-weak:rgba(227,169,58,.13); --amber-line:rgba(227,169,58,.34);
    --green:#76b900; --green-weak:rgba(118,185,0,.14); --green-line:rgba(118,185,0,.36);
    --shadow:inset 0 1.5px 0 rgba(255,255,255,.11), inset 0 -3px 4px rgba(0,0,0,.42), 0 8px 18px rgba(0,0,0,.55);
    --shadow-hover:inset 0 1.5px 0 rgba(255,255,255,.15), inset 0 -3px 4px rgba(0,0,0,.48), 0 12px 28px rgba(0,0,0,.66);
    --overlay:rgba(0,0,0,.6);
    --mark-fg:#0d1117;
  }
  *{box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.55;transition:background .16s,color .16s}
  svg{display:block}
  .app{position:relative;display:grid;grid-template-columns:var(--sbw) 1fr;min-height:100vh}

  .resizer{position:absolute;top:0;bottom:0;left:var(--sbw);width:9px;margin-left:-4px;cursor:col-resize;z-index:50;background:none;border:none;padding:0}
  .resizer span{position:absolute;left:3px;top:0;bottom:0;width:2px;background:transparent;transition:background .12s}
  .resizer:hover span,.resizer.drag span,.resizer:focus-visible span{background:var(--accent)}

  .sidebar{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{padding:20px 18px 14px;display:flex;align-items:center;gap:11px}
  .brand .mark{width:30px;height:30px;border-radius:8px;background:var(--accent);color:var(--mark-fg);display:grid;place-items:center;flex:0 0 auto}
  .brand .mark svg{width:17px;height:17px;stroke-width:2}
  .brand .name{font-weight:600;font-size:15px;letter-spacing:0}
  .brand .sub{font-size:10.5px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
  .search{margin:6px 14px 8px;position:relative}
  .search input{width:100%;padding:9px 10px 9px 32px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
  .search input::placeholder{color:var(--muted)}
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
  .search .mag{position:absolute;left:10px;top:9px;color:var(--muted);width:15px;height:15px}
  .navlabel{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--faint);padding:16px 20px 8px;font-weight:700;font-family:var(--mono)}
  button.navitem{font:inherit;border:none;background:none;text-align:left}
  .navitem{display:flex;align-items:center;gap:11px;width:calc(100% - 16px);padding:9px 12px;margin:2px 8px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--text-2);position:relative}
  .navitem:hover{background:var(--card);color:var(--text)}
  .navitem .ic{width:17px;height:17px;color:var(--muted);flex:none}
  .navitem .ic svg{width:17px;height:17px;stroke-width:1.7}
  .navitem.active{background:var(--accent-weak);color:var(--accent)}
  .navitem.active .ic{color:var(--accent)}
  .navitem.active::before{content:"";position:absolute;left:-8px;top:8px;bottom:8px;width:3px;border-radius:2px;background:var(--accent)}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:8px}
  .sb-foot{margin-top:auto;padding:14px 20px 20px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px;font-family:var(--mono)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-weak)}

  .main{padding:44px 48px 90px;max-width:1000px}
  .kicker{display:inline-flex;align-items:center;width:max-content;font:700 11px/1 var(--mono);color:var(--id-blue);background:var(--id-blue-weak);border:1px solid var(--id-blue-line);border-radius:5px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.14em;padding:5px 8px}
  h1.sec{font-size:26px;line-height:1.18;margin:0 0 9px;letter-spacing:0;font-weight:650}
  .sec-sub{color:var(--muted);font-size:14px;margin-bottom:24px;max-width:72ch;line-height:1.6}
  .thesis-lead{font-size:17px;line-height:1.5;font-weight:600;color:var(--text);margin:0 0 18px;max-width:74ch;letter-spacing:0}
  .main{width:100%}
  .main-top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin:0 0 28px;padding-bottom:18px;border-bottom:1px solid var(--line)}
  .draft-line{display:flex;align-items:center;gap:9px;color:var(--muted);font:600 11px/1 var(--mono);text-transform:uppercase;letter-spacing:.08em}
  .theme-toggle{display:inline-flex;align-items:center;gap:3px;padding:3px;border:1px solid var(--line);border-radius:999px;background:var(--card);box-shadow:0 1px 0 rgba(0,0,0,.02)}
  .theme-toggle button{font:700 11px/1 var(--mono);border:0;border-radius:999px;background:transparent;color:var(--muted);padding:8px 11px;min-width:56px;cursor:pointer}
  .theme-toggle button:hover{color:var(--text);background:var(--card-hover)}
  .theme-toggle button[aria-pressed="true"]{background:var(--accent);color:var(--mark-fg)}
  .project-state{display:grid;grid-template-columns:1.35fr repeat(3,1fr);gap:12px;margin:0 0 24px}
  .state-card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px 15px;box-shadow:var(--shadow);transition:border-color .14s,box-shadow .14s,transform .14s}
  .state-card:hover{border-color:var(--id-blue-line);box-shadow:var(--shadow-hover);transform:translateY(-1px)}
  .state-card .label{display:inline-flex;width:max-content;font:700 10px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--id-blue);background:var(--id-blue-weak);border:1px solid var(--id-blue-line);border-radius:5px;margin-bottom:10px;padding:4px 7px}
  .state-card .value{font-size:13px;line-height:1.45;color:var(--text-2)}
  .state-card.primary .value{font-size:14px;color:var(--text);font-weight:600}
  .legend{display:flex;gap:20px;flex-wrap:wrap;margin:0 0 28px;font-size:12.5px;color:var(--muted)}
  .legend .lr{display:flex;align-items:center;gap:8px}
  .legend .sw{width:15px;height:15px;border-radius:5px}
  .legend .sw.g{background:var(--amber)} .legend .sw.t{background:var(--green)}

  .cards{display:flex;flex-direction:column;gap:16px}
  .scard{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:20px 22px 20px;box-shadow:var(--shadow);transition:border-color .14s,box-shadow .14s,transform .14s}
  .scard:hover{border-color:var(--id-blue-line);box-shadow:var(--shadow-hover);transform:translateY(-1px)}
  .shead{display:flex;align-items:baseline;gap:11px;margin-bottom:16px}
  .sidx{font:700 12px/1 var(--mono);color:var(--faint)}
  .sname{font-size:18px;font-weight:600;letter-spacing:0}
  .srole{font:500 11.5px/1 var(--mono);color:var(--faint);margin-left:auto;white-space:nowrap}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:34px}
  .col h4{font:700 10px/1 var(--mono);letter-spacing:.13em;text-transform:uppercase;margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .col h4 .chip{width:8px;height:8px;border-radius:2px}
  .col.gives h4{color:var(--amber)} .col.gives h4 .chip{background:var(--amber)}
  .col.gets h4{color:var(--green)} .col.gets h4 .chip{background:var(--green)}
  .items{display:flex;flex-direction:column;gap:3px}
  button.item{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;font:inherit;color:var(--text-2);background:none;border:1px solid transparent;border-radius:9px;padding:8px 10px;cursor:pointer;line-height:1.42;font-size:14px}
  .item:hover{background:var(--card-hover);border-color:var(--line)}
  .item .num{flex:0 0 auto;width:20px;height:20px;border-radius:6px;font:700 10px/20px var(--mono);text-align:center}
  .item.gives .num{background:var(--amber-weak);color:var(--amber);border:1px solid var(--amber-line)}
  .item.gets .num{background:var(--green-weak);color:var(--green);border:1px solid var(--green-line)}
  .item.gives.top .num{background:var(--amber);color:var(--mark-fg);border-color:var(--amber)}
  .item.gets.top .num{background:var(--green);color:var(--mark-fg);border-color:var(--green)}
  .item .itx{flex:1 1 auto;padding-top:1px}
  .item.top .itx{color:var(--text);font-weight:600}
  .item .chev{flex:0 0 auto;width:14px;height:14px;color:var(--faint);opacity:0;transition:opacity .12s;margin-top:3px}
  .item:hover .chev{opacity:.75}
  .item .chev svg{width:14px;height:14px;stroke-width:2}
  .snote{margin-top:18px;padding-top:14px;border-top:1px solid var(--line-2);font-size:12.5px;color:var(--muted);line-height:1.55}
  .snote b{color:var(--text-2);font-weight:600}

  /* AI Hotel area cards */
  .context{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:16px 18px;margin-bottom:26px;font-size:13.5px;color:var(--text-2);line-height:1.6;max-width:78ch;box-shadow:var(--shadow)}
  .context b{color:var(--text);font-weight:600}
  .agrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  button.acard{font:inherit;text-align:left;color:inherit}
  .acard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px 52px 20px 20px;cursor:pointer;transition:border-color .14s,background .14s,transform .14s;display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .acard:hover{border-color:var(--id-blue-line);background:var(--card-hover);transform:translateY(-1px);box-shadow:var(--shadow-hover)}
  .ahead{display:flex;align-items:center;gap:12px;margin-bottom:11px}
  .atile{width:38px;height:38px;border-radius:10px;background:var(--bg);border:1px solid var(--line);display:grid;place-items:center;color:var(--text-2);flex:0 0 auto}
  .atile svg{width:19px;height:19px;stroke-width:1.7}
  .aname{font-size:15.5px;font-weight:600;letter-spacing:0;color:var(--amber)}
  .ablurb{font-size:13px;color:var(--text-2);line-height:1.55;margin-bottom:14px;flex:1 1 auto}
  .achips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:11px}
  .ca{font:600 10px/1 var(--mono);padding:4px 8px;border-radius:6px;background:var(--bg);border:1px solid var(--line);color:var(--muted)}
  .ca b{color:var(--text-2);font-weight:700}
  .averdict{font-size:12px;color:var(--accent);display:flex;align-items:center;gap:7px}
  .averdict .vt{width:5px;height:5px;border-radius:50%;background:var(--accent);flex:0 0 auto}
  .card-dots{position:absolute;right:14px;top:14px;color:var(--faint);font:700 18px/1 var(--mono);letter-spacing:1px;padding:3px 7px;border-radius:5px;transition:color .12s,background .12s}
  .acard:hover .card-dots{color:var(--text);background:var(--accent-weak)}

  /* library cards (Research / Communications) */
  .rgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px 20px;display:flex;flex-direction:column;transition:border-color .14s,background .14s;box-shadow:var(--shadow)}
  .rcard:hover{border-color:var(--id-blue-line);background:var(--card-hover);box-shadow:var(--shadow-hover)}
  .rtop{display:flex;align-items:center;gap:11px;margin-bottom:9px}
  .rti{width:34px;height:34px;border-radius:9px;background:var(--bg);border:1px solid var(--line);display:grid;place-items:center;color:var(--text-2);flex:0 0 auto}
  .rti svg{width:17px;height:17px;stroke-width:1.7}
  a.rtitle,span.rtitle{font-size:15.5px;font-weight:600;color:var(--text);text-decoration:none;letter-spacing:0}
  a.rtitle:hover{color:var(--accent)}
  .rstatus{margin-left:auto;font:700 9px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:6px;flex:0 0 auto}
  .rstatus.live{background:var(--green-weak);color:var(--green)}
  .rstatus.soon{background:var(--bg);color:var(--faint);border:1px solid var(--line)}
  .rmeta{font:500 11px/1.3 var(--mono);color:var(--faint);margin-bottom:11px}
  .rdesc{font-size:13px;color:var(--text-2);line-height:1.55;margin-bottom:15px;flex:1 1 auto}
  .rfoot{display:flex;align-items:center;gap:8px}
  a.rlink{display:inline-flex;align-items:center;gap:7px;font:600 12.5px/1 var(--sans);color:var(--accent);text-decoration:none;border:1px solid var(--accent-line);background:var(--accent-weak);padding:8px 13px;border-radius:8px}
  a.rlink:hover{background:var(--card-hover)}
  a.rlink .lic{display:flex} a.rlink .lic svg{width:13px;height:13px;stroke-width:2}
  span.rlink{display:inline-flex;align-items:center;gap:7px;font:600 12.5px/1 var(--sans);color:var(--accent);border:1px solid var(--accent-line);background:var(--accent-weak);padding:8px 13px;border-radius:8px}
  span.rlink .lic{display:flex} span.rlink .lic svg{width:13px;height:13px;stroke-width:2}
  .rsoon{font:600 11px/1 var(--mono);color:var(--faint);border:1px solid var(--line);padding:8px 12px;border-radius:8px}

  /* Field notes (live captures from the phone) */
  .ngrid{display:flex;flex-direction:column;gap:14px}
  .ncard{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px 18px;display:flex;gap:14px;box-shadow:var(--shadow);transition:border-color .14s,box-shadow .14s}
  .ncard:hover{border-color:var(--id-blue-line);box-shadow:var(--shadow-hover)}
  .nthumb{width:64px;height:64px;border-radius:8px;object-fit:cover;border:1px solid var(--line);flex:0 0 auto;background:var(--bg)}
  .nphotos{font:600 12px/1.4 var(--mono);color:var(--id-blue);margin-top:9px}
  .nphotos-ph{font-size:13px;color:var(--muted);margin:8px 0}
  .nthumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .nthumbs img{width:44px;height:44px;border-radius:6px;object-fit:cover;border:1px solid var(--line);background:var(--bg)}
  /* AI_HOTEL_FIELDNOTES_IMAGE_VIEWER_FIX_1: tappable detail thumbs + lightbox */
  .nthumbs img.nthumb-tap{width:72px;height:72px;border-radius:7px;cursor:pointer;transition:transform .08s ease}
  .nthumbs img.nthumb-tap:hover{transform:scale(1.05)}
  .nthumb-missing{background:var(--panel)}
  .lbox{position:fixed;inset:0;z-index:9999;background:rgba(8,8,8,.93);display:flex;align-items:center;justify-content:center}
  .lbox-stage{max-width:96vw;max-height:88vh;display:flex;align-items:center;justify-content:center}
  .lbox-img{max-width:96vw;max-height:88vh;object-fit:contain;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,.55)}
  .nthumb,.nthumbs img,.lbox-img{image-orientation:from-image}
  .lbox-msg{color:#eee;font:500 14px/1.4 var(--sans)}
  .lbox-x{position:absolute;top:14px;right:16px;width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:18px;cursor:pointer}
  .lbox-rotate{position:absolute;top:14px;right:64px;width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:20px;cursor:pointer}
  .lbox-rotate:disabled{opacity:.45;cursor:default}
  .lbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:26px;line-height:1;cursor:pointer}
  .lbox-prev{left:12px}.lbox-next{right:12px}
  .lbox-count{position:absolute;bottom:16px;left:0;right:0;text-align:center;color:#ddd;font:600 13px/1 var(--mono)}
  .nbody{flex:1 1 auto;min-width:0}
  .nsmry{font-size:14.5px;color:var(--text);line-height:1.5;margin-bottom:10px;word-wrap:break-word}
  .nmeta{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .ntag{font:700 10px/1 var(--mono);letter-spacing:.04em;text-transform:uppercase;padding:4px 8px;border-radius:6px}
  .ntag.use_case{background:var(--amber-weak);color:var(--amber);border:1px solid var(--amber-line)}
  .ntag.stakeholder{background:var(--green-weak);color:var(--green);border:1px solid var(--green-line)}
  .ntag.research{background:var(--id-blue-weak);color:var(--id-blue);border:1px solid var(--id-blue-line)}
  .ntag.comms{background:var(--accent-weak);color:var(--accent);border:1px solid var(--accent-line)}
  .ntag.general{background:var(--bg);color:var(--muted);border:1px solid var(--line)}
  .nrel{font:600 11px/1 var(--mono);color:var(--text-2)}
  .ntime{font:500 11px/1 var(--mono);color:var(--faint);margin-left:auto}
  .nempty{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:22px;text-align:center;color:var(--muted);font-size:14px;box-shadow:var(--shadow)}
  /* AI_HOTEL_FIELD_NOTES_CARD_SHELF_1: card-type chips, filters, compact row, detail */
  .nfilter{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 16px}
  .nfbtn{font:600 12px/1 var(--sans);padding:8px 13px;border-radius:7px;border:1px solid var(--line);background:var(--card);color:var(--text-2);cursor:pointer}
  .nfbtn.on{background:var(--id-blue);color:#fff;border-color:var(--id-blue)}
  .nkeyhint{margin-bottom:14px}
  .nkeyrow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .nkeyinput{font:500 14px/1.2 var(--sans);padding:9px 12px;border-radius:7px;border:1px solid var(--line);background:var(--bg);color:var(--text);min-width:200px;max-width:280px}
  .nkeybtn{font:600 13px/1 var(--sans);padding:9px 16px;border-radius:7px;border:1px solid var(--id-blue);background:var(--id-blue);color:#fff;cursor:pointer}
  .nkeybtn:disabled{opacity:.6;cursor:default}
  .nkeymsg{display:none;margin-top:11px;font-size:13px;color:var(--red,#b42318)}
  .nkeymsg.show{display:block}
  .nforget{font:600 11px/1 var(--sans);padding:8px 11px;border-radius:7px;border:1px dashed var(--line);background:transparent;color:var(--muted);cursor:pointer;margin-left:auto}
  .ntag.kind-site{background:var(--id-blue-weak);color:var(--id-blue);border:1px solid var(--id-blue-line)}
  .ntag.kind-supplier{background:var(--green-weak);color:var(--green);border:1px solid var(--green-line)}
  .ntag.kind-free{background:var(--bg);color:var(--muted);border:1px solid var(--line)}
  .ncompact{font:500 12.5px/1.5 var(--mono);color:var(--text-2);margin-top:9px;word-wrap:break-word}
  .kv{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)}

const NOTE_SECTION_LABELS={use_case:'Use case',stakeholder:'Stakeholder',research:'Research',comms:'Comms',general:'General'};
function noteSection(s){return (s in NOTE_SECTION_LABELS)?s:'general';}
function fmtNoteTime(iso){
  if(!iso)return '';
  const d=new Date(iso);if(isNaN(d.getTime()))return '';
  try{return d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
  catch(e){return String(iso).slice(0,16);}

/* AI_HOTEL_FIELD_NOTES_CARD_SHELF_1: structured cards folded into Field notes */
// AI_HOTEL_REMEMBER_KEY_1: a bookmarked/shared link that dropped ?key= rendered
// an EMPTY feed (no X-Baker-Key → 401) — the Director "can't see my card" root
// cause. Persist the key on first keyed visit, fall back to it when the URL has
// none, and strip ?key= from the address bar (localStorage is per-origin and not
// leaked in a copied link / referer — strictly better than key-in-URL). All
// existing callers keep calling noteKey() unchanged. localStorage is wrapped in
// try/catch (Safari private mode throws). The strip runs once: after it, the URL
// has no key so subsequent calls take the stored-key branch.
// AI_HOTEL_KEY_PASTE_SELFSERVE_1: _aihSessionKey is an in-memory fallback so a
// key entered on the self-service empty state (or supplied via ?key=) still
// authenticates the session even when localStorage throws (Safari private mode).
var _aihSessionKey='';
var _aihDeletedCaptureIds={};
function noteKey(){
  try{
    var u=new URLSearchParams(location.search);
    var k=u.get('key');
    if(k){
      _aihSessionKey=k;
      try{localStorage.setItem('aih.key',k);}catch(e){}
      try{u.delete('key');var qs=u.toString();history.replaceState({},'',location.pathname+(qs?('?'+qs):''));}catch(e){}
      return k;
    }
    try{var s=localStorage.getItem('aih.key');if(s)return s;}catch(e){}
    return _aihSessionKey||'';
  }catch(e){return _aihSessionKey||'';}
}
function aiHotelReadOptions(){
  const opts={credentials:'same-origin'};
  const k=noteKey();
  if(k)opts.headers={'X-Baker-Key':k};
  return opts;
}
function aiHotelJsonOptions(body){
  const opts=aiHotelReadOptions();
  opts.method='POST';
  opts.headers=Object.assign({'Content-Type':'application/json'},opts.headers||{});
  opts.body=JSON.stringify(body||{});
  return opts;
}
function cardKind(c){
  const ft=c.form_record&&c.form_record.form_type;
  if(ft==='site_visit')return 'site';
  if(ft==='supplier_card')return 'supplier';
  return 'free';
}
function cardKindLabel(k){return k==='site'?'Site':(k==='supplier'?'Supplier':'Free note');}
function researchCount(u){return u?String(u).split(';').map(s=>s.trim()).filter(Boolean).length:0;}
function humanizeVal(v){return String(v).replace(/_/g,' ');}
// AI_HOTEL_READABLE_CARD_TITLE_1: Director cannot use DB row numbers — cards are
// named "<Name> · <HH:MM>" (capture time, same locale as the Captured line) so the
// label matches how the site is referred to in conversation. Name = site label /
// company / first words of the summary.
function fmtNoteHM(iso){if(!iso)return '';try{const d=new Date(iso);if(isNaN(d.getTime()))return '';return d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});}catch(e){return '';}}
function cardName(c){

  const k=cardKind(c);
  let nm='';
  if(k==='site')nm=v.site_label||v.site_name||'';

  if(!nm){const s=(c.summary||'').trim();nm=s?s.split(/\s+/).slice(0,6).join(' '):'';}

// AI_HOTEL_KEY_PASTE_SELFSERVE_1: self-service key entry on the keyless empty
// state. REMEMBER_KEY (#385/#386) cures the bookmarked-link case, but the
// dashboard route (<a href="/static/ai-hotel.html"> with no ?key=) and a
// different-surface entry (Cowork/phone) carry no key and localStorage doesn't
// cross — so the page could not self-heal. This lets the Director paste the key
// once from ANY surface. The key is validated with a probe fetch BEFORE it is
// stored, so a wrong key never overwrites a good stored key into a broken state.
function renderKeyEntry(main){
  const box=el('div','nempty');
  box.appendChild(el('div','nkeyhint','Field notes are private. Enter the access code, or paste your access key once to load them on this device.'));
  const pinRow=el('div','nkeyrow');
  const pin=document.createElement('input');
  pin.type='text';pin.inputMode='numeric';pin.pattern='[0-9]*';pin.maxLength=4;
  pin.placeholder='Enter access code';pin.className='nkeyinput';
  pin.autocomplete='one-time-code';pin.autocapitalize='off';pin.spellcheck=false;
  const pinBtn=el('button','nkeybtn','Unlock');
  pinRow.appendChild(pin);pinRow.appendChild(pinBtn);
  box.appendChild(pinRow);
  const row=el('div','nkeyrow');
  const inp=document.createElement('input');
  inp.type='password';inp.placeholder='Paste access key';inp.className='nkeyinput';
  inp.autocomplete='off';inp.autocapitalize='off';inp.spellcheck=false;
  const btn=el('button','nkeybtn','Load field notes');
  row.appendChild(inp);row.appendChild(btn);
  const msg=el('div','nkeymsg');
  box.appendChild(row);box.appendChild(msg);
  main.appendChild(box);
  function attemptPin(){
    const p=(pin.value||'').trim();
    if(!p){pin.focus();return;}
    pinBtn.disabled=true;pinBtn.textContent='Unlocking...';msg.textContent='';msg.className='nkeymsg';
    fetch('/api/ai-hotel/pin-auth',{
      method:'POST',
      credentials:'same-origin',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pin:p})
    })
      .then(function(r){
        if(r.status===401||r.status===403)throw new Error('unauth');
        if(r.status===429)throw new Error('limited');
        if(!r.ok)throw new Error('http');
        return r.json();
      })
      .then(function(){show('notes');})
      .catch(function(e){
        pinBtn.disabled=false;pinBtn.textContent='Unlock';
        msg.className='nkeymsg show';
        msg.textContent=(e&&e.message==='limited')
          ?'Too many attempts - wait and try again.'
          :((e&&e.message==='unauth')
            ?'Code not accepted - check it and try again.'
            :'Could not unlock - check your connection and try again.');
      });
  }
  function attemptKey(){
    const k=(inp.value||'').trim();
    if(!k){inp.focus();return;}
    btn.disabled=true;btn.textContent='Loading…';msg.textContent='';msg.className='nkeymsg';
    // Probe with the entered key BEFORE persisting — never store a bad key.
    fetch('/api/ai-hotel/captures?limit=1',{headers:{'X-Baker-Key':k}})
      .then(function(r){
        if(r.status===401||r.status===403)throw new Error('unauth');
        if(!r.ok)throw new Error('http');
        return r.json();
      })
      .then(function(){
        _aihSessionKey=k;                         // session fallback (Safari private)
        try{localStorage.setItem('aih.key',k);}catch(e){}
        show('notes');                            // re-render; noteKey() now resolves the key → cards load
      })
      .catch(function(e){
        btn.disabled=false;btn.textContent='Load field notes';
        msg.className='nkeymsg show';
        msg.textContent=(e&&e.message==='unauth')
          ?'Key not accepted — check it and try again.'
          :'Could not load — check your connection and try again.';
      });
  }
  pinBtn.onclick=attemptPin;
  pin.addEventListener('keydown',function(e){if(e.key==='Enter')attemptPin();});
  btn.onclick=attemptKey;
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')attemptKey();});
}

function renderNotes(main){
  main.appendChild(el('div','kicker','From the floor'));
  main.appendChild(el('h1','sec','Field notes'));
  main.appendChild(el('div','sec-sub','Photos, notes and saved cards captured on the phone, sorted automatically. Newest first. Tap a card to see its fields and raw capture.'));

    bar.appendChild(b);
  });
  // AI_HOTEL_KEY_PASTE_SELFSERVE_1: a small "Forget key" affordance (shared-device
  // safety) — clears the stored + session key and returns to the entry state.
  const forget=el('button','nforget','Forget key');

  function apply(){
    while(wrap.firstChild)wrap.removeChild(wrap.firstChild);

    if(!list.length){wrap.appendChild(el('div','nempty','No field notes in this filter yet.'));return;}
    list.forEach(function(c){wrap.appendChild(buildNoteCard(c));});
  }
  fetch('/api/ai-hotel/captures?limit=100',aiHotelReadOptions())
    .then(function(r){
      if((r.status===401||r.status===403)&&!key)throw new Error('unauth');
      if(!r.ok)throw new Error('http');
      return r.json();
    })
    .then(function(data){
      allCaps=(data&&Array.isArray(data.captures))?data.captures:[];
      if(!allCaps.length){while(wrap.firstChild)wrap.removeChild(wrap.firstChild);wrap.appendChild(el('div','nempty','No field notes yet. Snap or dictate one from the capture page.'));return;}
      apply();
    })
    .catch(function(e){
      if(e&&e.message==='unauth'){
        while(main.firstChild)main.removeChild(main.firstChild);
        renderKeyEntry(main);
        return;
      }
      while(wrap.firstChild)wrap.removeChild(wrap.firstChild);
      wrap.appendChild(el('div','nempty','Could not load field notes. Check your key and connection.'));
    });
}

// AI_HOTEL_GPS_CAPTURE_1: accuracy tiers — ≤50 m verified, ≤150 m approx., else
// low-accuracy (flagged, never shown as exact). The server stores no geocoded
// address for a >150 m fix, so 'low' naturally falls through to the dictated clue.
function gpsAccuracyTier(g){
  if(!g||g.lat==null||g.accuracy_m==null)return null;
  if(g.accuracy_m<=50)return 'verified';
  if(g.accuracy_m<=150)return 'approx';
  return 'low';
}
// Compact-row location preference (Director: GPS = verified evidence, separate
// from the dictated clue which is a claim): (1) verified GPS address, (2) approx.
// GPS address, (3) dictated clue when GPS is absent/low-accuracy, (4) missing.
function compactLocation(c,v){
  const g=c&&c.gps;const tier=gpsAccuracyTier(g);
  if(g&&g.address&&tier==='verified')return '📍 '+g.address;
  if(g&&g.address&&tier==='approx')return '📍 '+g.address+' (approx.)';
  if(v&&v.address_or_location_clue)return v.address_or_location_clue;
  if(v&&v.geo_context)return v.geo_context;
  if(g&&g.lat!=null)return '📍 location tagged'+(g.accuracy_m!=null?(' (±'+Math.round(g.accuracy_m)+' m)'):'');
  return 'Location missing';
}
function buildNoteCard(c){
  const kind=cardKind(c);
  const card=el('div','ncard');
  card.dataset.captureId=String(c.id);
  // Tiny server-side thumbnail only (full images load on tap) — keeps the feed small.
  if(c.thumb){const img=document.createElement('img');img.className='nthumb';img.src=c.thumb;img.alt='Field photo';img.loading='lazy';img.dataset.captureId=String(c.id);card.appendChild(img);}
  const body=el('div','nbody');
  // AI_HOTEL_READABLE_CARD_TITLE_1: readable "<Name> · <HH:MM>" title; raw summary
  // demoted to a secondary line so no context is lost.
  body.appendChild(el('div','nsmry',cardTitle(c)));
  const _sm=(c.summary||'').trim();
  if(_sm&&_sm!==cardName(c))body.appendChild(el('div','ncompact',_sm));
  const meta=el('div','nmeta');
  meta.appendChild(el('span','ntag kind-'+kind,cardKindLabel(kind)));   // type chip
  if(kind==='free'){const sec=noteSection(c.section_guess);meta.appendChild(el('span','ntag '+sec,NOTE_SECTION_LABELS[sec]));}
  if(c.related_area)meta.appendChild(el('span','nrel',c.related_area));
  meta.appendChild(el('span','ntime',fmtNoteTime(c.created_at)));
  body.appendChild(meta);
  // Compact structured row for site / supplier cards.
  const v=(c.form_record&&c.form_record.values)||{};
  if(kind==='site'){
    const bits=[];
    const loc=compactLocation(c,v);if(loc)bits.push(loc);
    if(v.hospitality_fit)bits.push('fit: '+humanizeVal(v.hospitality_fit));
    if(v.overall_score)bits.push('score '+v.overall_score+'/5');
    if(v.next_action)bits.push('→ '+humanizeVal(v.next_action));
    if(v.research_findings&&typeof v.research_findings==='object')bits.push('✓ researched');
    else{const miss=researchCount(v.unknowns_to_research);if(miss)bits.push(miss+' to research');}
    if(bits.length)body.appendChild(el('div','ncompact',bits.join('  ·  ')));
  } else if(kind==='supplier'){
    const bits=[];
    if(v.company_name)bits.push(v.company_name);
    if(v.ai_hotel_category)bits.push(humanizeVal(v.ai_hotel_category));
    if(v.follow_up_action&&v.follow_up_action!=='none')bits.push('→ '+humanizeVal(v.follow_up_action));
    if(bits.length)body.appendChild(el('div','ncompact',bits.join('  ·  ')));
  }
  if((c.image_count||0)>1){ body.appendChild(el('div','nphotos',c.image_count+' photos · tap to view')); }
  const vids=Array.isArray(c.video)?c.video:[];
  if(vids.length){
    const dur=vids[0].duration_seconds?(' · '+Math.round(vids[0].duration_seconds)+'s'):'';
    body.appendChild(el('div','nvideo',vids.length+' video'+(vids.length>1?'s':'')+dur+' · tap to play'));
  }
  card.appendChild(body);
  card.style.cursor='pointer';
  card.onclick=function(){openNoteDetail(c);};
  return card;
}

function updatePhotoThumbs(c, idx, thumb){
  if(!thumb)return;
  if(idx===0){
    c.thumb=thumb;
    Array.prototype.forEach.call(document.querySelectorAll('.nthumb[data-capture-id="'+c.id+'"]'),function(img){
      img.src=thumb;
    });
  }
  Array.prototype.forEach.call(document.querySelectorAll('.nthumbs[data-capture-id="'+c.id+'"] img[data-photo-idx="'+idx+'"]'),function(img){
    img.src=thumb;img.classList.remove('nthumb-missing');
  });
}

function removeDeletedNoteCard(c){
  _aihDeletedCaptureIds[String(c.id)]=true;
  Array.prototype.forEach.call(document.querySelectorAll('.ncard[data-capture-id="'+c.id+'"]'),function(card){
    if(card&&card.parentNode)card.parentNode.removeChild(card);
  });
  const grid=document.querySelector('.ngrid');
  if(grid&&!grid.querySelector('.ncard')&&!grid.querySelector('.nempty')){
    grid.appendChild(el('div','nempty','No field notes in this filter yet.'));

function deleteNoteCard(c, btn){
  if(!confirm('Delete this field note? It will be hidden.'))return;
  if(btn){btn.disabled=true;btn.textContent='Deleting…';}
  fetch('/api/ai-hotel/captures/'+c.id+'/delete',aiHotelJsonOptions({}))
    .then(function(r){if(!r.ok)throw new Error();return r.json();})
    .then(function(){
      removeDeletedNoteCard(c);
      document.getElementById('detail').close();
    })
    .catch(function(){
      if(btn){btn.disabled=false;btn.textContent='Delete field note';}

function appendResearchFindingsText(lines, rf){
  if(!rf||typeof rf!=='object')return;
  lines.push('','Research findings');
  if(rf.headline)lines.push('Headline: '+String(rf.headline));
  const meta=[rf.source,rf.confidence,rf.researched_on?('researched '+rf.researched_on):''].filter(Boolean).join('  ·  ');
  if(meta)lines.push('Meta: '+meta);
  const answers=Array.isArray(rf.answers)?rf.answers:[];
  answers.forEach(function(a){
    if(!a)return;
    const q=a.q||a.question||'';
    const val=a.a||a.answer||'';
    if(!q&&!val)return;
    lines.push(String(q)+': '+String(val));
  });
  const flags=Array.isArray(rf.flags)?rf.flags:[];
  flags.forEach(function(f){if(f)lines.push('Flag: '+String(f));});
  const needs=rf.needs||rf.needs_paid_pull;
  if(needs)lines.push('Needs: '+String(needs));
  if(rf.sources)lines.push('Sources: '+String(rf.sources));
}

function cardAsText(c){
  const lines=[];
  lines.push(cardKindLabel(cardKind(c))+' — '+(c.summary||''));
  const v=(c.form_record&&c.form_record.values)||{};
  const rf=v.research_findings;
  Object.keys(v).forEach(function(k){
    if(k==='research_findings')return;
    if(k==='unknowns_to_research'&&rf&&typeof rf==='object')return;
    const val=v[k];if(val!==null&&val!==undefined&&val!=='')lines.push(humanizeVal(k)+': '+String(val));
  });
  if(rf&&typeof rf==='object')appendResearchFindingsText(lines,rf);
  if(c.note_text)lines.push('',c.note_text);
  return lines.join('\n');
}

// AI_HOTEL_FIELDNOTES_IMAGE_VIEWER_FIX_1: detail-modal photo strip. The old path
// fetched ALL full-res images in one response (capture 17 = 2.07 MB → "Loading
// photos…" hang on cellular) and showed them as un-enlargeable 44px crops. Now
// the strip loads tiny per-image thumbs immediately (GET /thumbs) and each thumb
// is tap-to-enlarge — the single full-res image loads on demand in a lightbox.
function renderPhotos(b, c){
  const n=c.image_count||0;
  if(n<=0)return;
  b.appendChild(el('div','dlg-h','Photos · '+n));
  const ph=el('div','nphotos-ph','Loading photos…');
  b.appendChild(ph);
  fetch('/api/ai-hotel/captures/'+c.id+'/thumbs',aiHotelReadOptions())
    .then(function(r){return r.json();})
    .then(function(d){
      const list=(d&&Array.isArray(d.thumbs))?d.thumbs:[];
      ph.remove();
      if(!list.length){b.appendChild(el('div','nphotos-ph','No photos found.'));return;}
      const strip=el('div','nthumbs');
      strip.dataset.captureId=String(c.id);
      list.forEach(function(src,i){
        const t=document.createElement('img');
        t.alt='Field photo '+(i+1);t.loading='lazy';t.className='nthumb-tap';t.title='Tap to enlarge';
        t.dataset.photoIdx=String(i);
        if(src)t.src=src; else t.classList.add('nthumb-missing');
        t.onclick=function(){openLightbox(c,i);};
        strip.appendChild(t);
      });
      b.appendChild(strip);
    })
    .catch(function(){ph.textContent='Could not load photos — reopen to retry.';});
}

// Full-screen photo viewer. Loads ONE full-res image at a time on demand
// (GET /captures/{id}/images/{idx}) so the modal never pulls the whole set;
// prev/next + swipe between a card's photos; tap backdrop / ✕ / Esc to close.
function openLightbox(c, startIdx){
  const total=c.image_count||0;
  if(total<=0)return;
  let idx=Math.max(0,Math.min(startIdx||0,total-1));
  const cache={};
  const ov=el('div','lbox');ov.setAttribute('role','dialog');ov.setAttribute('aria-label','Photo viewer');
  const stage=el('div','lbox-stage');
  const imgEl=document.createElement('img');imgEl.className='lbox-img';imgEl.alt='Field photo';imgEl.style.display='none';
  const spin=el('div','lbox-msg','Loading…');
  stage.appendChild(spin);stage.appendChild(imgEl);
  const counter=el('div','lbox-count','');
  const closeBtn=el('button','lbox-x','✕');closeBtn.setAttribute('aria-label','Close');
  const rotateBtn=el('button','lbox-rotate','↻');rotateBtn.setAttribute('aria-label','Rotate photo clockwise');rotateBtn.title='Rotate photo clockwise';rotateBtn.disabled=true;
  const prev=el('button','lbox-nav lbox-prev','‹');prev.setAttribute('aria-label','Previous photo');
  const next=el('button','lbox-nav lbox-next','›');next.setAttribute('aria-label','Next photo');
  ov.appendChild(closeBtn);ov.appendChild(rotateBtn);ov.appendChild(prev);ov.appendChild(stage);ov.appendChild(next);ov.appendChild(counter);
  document.body.appendChild(ov);
  function close(){document.removeEventListener('keydown',onKey);ov.remove();}
  function load(){
    counter.textContent=(idx+1)+' / '+total;
    prev.style.visibility=next.style.visibility=(total>1?'visible':'hidden');
    rotateBtn.disabled=true;
    if(cache[idx]){imgEl.src=cache[idx];imgEl.style.display='block';spin.style.display='none';rotateBtn.disabled=false;return;}
    imgEl.style.display='none';spin.style.display='block';spin.textContent='Loading…';
    const want=idx;
    fetch('/api/ai-hotel/captures/'+c.id+'/images/'+idx,aiHotelReadOptions())
      .then(function(r){return r.json();})
      .then(function(d){
        if(want!==idx)return;
        if(d&&d.image){cache[idx]=d.image;imgEl.src=d.image;imgEl.style.display='block';spin.style.display='none';rotateBtn.disabled=false;}
        else{spin.textContent='Photo unavailable.';}
      })
      .catch(function(){if(want===idx)spin.textContent='Could not load — use ‹ › to retry.';});
  }
  function rotateCurrent(e){
    e.stopPropagation();
    if(rotateBtn.disabled)return;
    rotateBtn.disabled=true;counter.textContent=(idx+1)+' / '+total+' · Rotating…';
    const want=idx;
    fetch('/api/ai-hotel/captures/'+c.id+'/images/'+idx+'/rotate',aiHotelJsonOptions({deg:90}))
      .then(function(r){if(!r.ok)throw new Error('rotate');return r.json();})
      .then(function(d){
        if(want!==idx)return;
        if(d&&d.image){cache[idx]=d.image;imgEl.src=d.image;imgEl.style.display='block';spin.style.display='none';}
        updatePhotoThumbs(c,idx,d&&d.thumb);
        counter.textContent=(idx+1)+' / '+total;
        rotateBtn.disabled=false;
      })
      .catch(function(){
        if(want!==idx)return;
        counter.textContent=(idx+1)+' / '+total+' · Rotate failed';
        rotateBtn.disabled=false;
      });
  }
  function go(d){idx=(idx+d+total)%total;load();}
  prev.onclick=function(e){e.stopPropagation();go(-1);};
  next.onclick=function(e){e.stopPropagation();go(1);};
  rotateBtn.onclick=rotateCurrent;
  closeBtn.onclick=function(e){e.stopPropagation();close();};
  ov.onclick=function(){close();};
  stage.onclick=function(e){e.stopPropagation();};
  function onKey(e){if(e.key==='Escape')close();else if(e.key==='ArrowLeft')go(-1);else if(e.key==='ArrowRight')go(1);}
  document.addEventListener('keydown',onKey);
  let sx=null;
  stage.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;},{passive:true});
  stage.addEventListener('touchend',function(e){if(sx==null)return;const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)go(dx<0?1:-1);sx=null;},{passive:true});
  load();
}

function openNoteDetail(c){
  const kind=cardKind(c);
  const fr=c.form_record;
  const tag=document.getElementById('dlgTag');
  tag.className='dlg-tag area';
  tag.textContent=cardKindLabel(kind)+(fr&&fr.status?(' · '+fr.status):'');
  const title=document.getElementById('dlgTitle');
  // AI_HOTEL_READABLE_CARD_TITLE_1: detail header uses the same readable title.
  title.textContent=cardTitle(c);title.style.color='';
  document.getElementById('dlgWho').textContent=fmtNoteTime(c.created_at);
  const b=document.getElementById('dlgBody');while(b.firstChild)b.removeChild(b.firstChild);
  // Structured fields (AC3).
  if(fr&&fr.values){
    const rf=fr.values.research_findings;
    b.appendChild(el('div','dlg-h','Card fields'));
    let any=false;
    Object.keys(fr.values).forEach(function(k){
      if(k==='research_findings')return;
      if(k==='unknowns_to_research'&&rf&&typeof rf==='object')return;
      const val=fr.values[k];if(val===null||val===undefined||val==='')return;
      any=true;
      const row=el('div','kv');row.appendChild(el('span','kvk',humanizeVal(k)));row.appendChild(el('span','kvv',String(val)));
      b.appendChild(row);
    });
    if(!any)b.appendChild(el('p',null,'No fields were filled on this card.'));
    if(rf&&typeof rf==='object')renderResearchFindings(b,rf);
  }
  // AI_HOTEL_FIELDNOTES_IMAGE_VIEWER_FIX_1: photos near the top (not buried under
  // GPS/audio), small thumbs that load immediately, tap-to-enlarge full-res.
  renderPhotos(b, c);
  // AI_HOTEL_GPS_CAPTURE_1: location evidence shown SEPARATELY from the dictated
  // clue (evidence vs claim). The Maps link is built from lat/lng (URL-encoded),
  // NEVER from the free-text address (AC8).
  (function(){
    const g=c.gps;const vv=(fr&&fr.values)||{};
    const clue=vv.address_or_location_clue||vv.geo_context||'';
    b.appendChild(el('div','dlg-h','Location'));
    if(g&&g.lat!=null){
      const tier=gpsAccuracyTier(g);
      const tierLabel=(tier==='verified')?'verified':((tier==='approx')?'approximate':'low accuracy');
      if(g.address){const r=el('div','kv');r.appendChild(el('span','kvk','GPS address'));r.appendChild(el('span','kvv',g.address+((tier==='approx')?' (approx.)':'')));b.appendChild(r);}
      const cr=el('div','kv');cr.appendChild(el('span','kvk','Coordinates'));cr.appendChild(el('span','kvv',Number(g.lat).toFixed(6)+', '+Number(g.lng).toFixed(6)));b.appendChild(cr);
      if(g.accuracy_m!=null){const ar=el('div','kv');ar.appendChild(el('span','kvk','Accuracy'));ar.appendChild(el('span','kvv','±'+Math.round(g.accuracy_m)+' m ('+tierLabel+')'));b.appendChild(ar);}
      if(g.captured_at){const tr=el('div','kv');tr.appendChild(el('span','kvk','Captured'));tr.appendChild(el('span','kvv',fmtNoteTime(g.captured_at)));b.appendChild(tr);}
      if(g.address_source){const sr=el('div','kv');sr.appendChild(el('span','kvk','Address source'));sr.appendChild(el('span','kvv',g.address_source));b.appendChild(sr);}
      const q=encodeURIComponent(Number(g.lat)+','+Number(g.lng));
      const linkRow=el('div','dlg-acts');
      const gm=document.createElement('a');gm.href='https://maps.google.com/?q='+q;gm.target='_blank';gm.rel='noopener';gm.className='sbtn2';gm.textContent='Open in Google Maps';linkRow.appendChild(gm);
      const am=document.createElement('a');am.href='geo:'+q;am.className='sbtn2';am.textContent='Open in Maps';linkRow.appendChild(am);
      b.appendChild(linkRow);
    } else if(g&&g.address_status==='permission_denied'){
      b.appendChild(el('p',null,'No GPS — location permission was denied at capture.'));
    } else if(g&&g.address_status==='timeout'){
      b.appendChild(el('p',null,'No GPS — a location fix could not be obtained at capture.'));
    } else {
      b.appendChild(el('p',null,'No GPS location was captured.'));
    }
    if(clue){const dr=el('div','kv');dr.appendChild(el('span','kvk','Dictated clue'));dr.appendChild(el('span','kvv',clue));b.appendChild(dr);}
  })();
  // Raw evidence (AC3): transcript/note + audio + photos.
  b.appendChild(el('div','dlg-h','Raw capture'));
  if(c.note_text)b.appendChild(el('p',null,c.note_text));
  else b.appendChild(el('p',null,c.summary||'(no dictated text)'));
  // Audio: list view carries METADATA only (AC10); full bytes load on demand.
  const aud=Array.isArray(c.audio)?c.audio:[];
  if(aud.length){
    const dur=aud[0].duration_seconds?(aud[0].duration_seconds+'s'):'recording';
    b.appendChild(el('div','dlg-h','Audio · '+dur));
    const loadBtn=el('button','sbtn2','Load & play audio');
    loadBtn.onclick=function(){
      loadBtn.disabled=true;loadBtn.textContent='Loading…';
      fetch('/api/ai-hotel/captures/'+c.id+'/audio',aiHotelReadOptions())
        .then(function(r){return r.json();})
        .then(function(d){
          const list=(d&&Array.isArray(d.audio))?d.audio:[];
          if(!list.length){loadBtn.textContent='No audio found';return;}
          loadBtn.remove();
          list.forEach(function(clip,i){
            const au=document.createElement('audio');au.controls=true;au.preload='none';au.src=clip.audio;au.className='naudio';
            b.appendChild(au);
            const dl=document.createElement('a');dl.href=clip.audio;
            dl.download='dictation-'+c.id+'-'+i+'.'+((String(clip.audio_media||'audio/webm').split('/')[1])||'webm');
            dl.textContent='Download audio';dl.className='naudio-dl';
            b.appendChild(dl);
          });
        })
        .catch(function(){loadBtn.disabled=false;loadBtn.textContent='Load failed — retry';});
    };
    b.appendChild(loadBtn);
  }
  // Video: list view carries METADATA only; R2 playback URLs are signed on demand.
  const vids=Array.isArray(c.video)?c.video:[];
  if(vids.length){
    const dur=vids[0].duration_seconds?(Math.round(vids[0].duration_seconds)+'s'):'clip';
    b.appendChild(el('div','dlg-h','Site video · '+dur));
    const loadVideo=el('button','sbtn2','Load & play video');
    loadVideo.onclick=function(){
      loadVideo.disabled=true;loadVideo.textContent='Loading…';
      fetch('/api/ai-hotel/captures/'+c.id+'/media',aiHotelReadOptions())
        .then(function(r){return r.json();})
        .then(function(d){
          const list=(d&&Array.isArray(d.media))?d.media:[];
          if(!list.length){loadVideo.textContent='No video found';return;}
          loadVideo.remove();
          list.forEach(function(clip,i){
            if(!clip.url){b.appendChild(el('div','nphotos-ph','Video exists, but playback URL is unavailable right now.'));return;}
            const vv=document.createElement('video');
            vv.controls=true;vv.preload='none';vv.playsInline=true;vv.className='nvideo-player';
            vv.src=clip.url;if(clip.thumbnail_url)vv.poster=clip.thumbnail_url;
            b.appendChild(vv);
            const meta=[];
            if(clip.duration_seconds)meta.push(Math.round(clip.duration_seconds)+'s');
            if(clip.size_bytes)meta.push((clip.size_bytes/(1024*1024)).toFixed(1)+' MB');
            if(clip.content_type)meta.push(clip.content_type);
            if(meta.length)b.appendChild(el('div','nvideo-meta',meta.join(' · ')));
            const open=document.createElement('a');
            open.href=clip.url;open.target='_blank';open.rel='noopener';open.className='naudio-dl';
            open.textContent='Open video';b.appendChild(open);
          });
        })
        .catch(function(){loadVideo.disabled=false;loadVideo.textContent='Load failed — retry';});
    };
    b.appendChild(loadVideo);
  }
  // Photos now render near the top (renderPhotos, called right after Card fields)
  // — moved out from under GPS/audio so they are the first thing the Director
  // sees, and the strip loads small thumbs (not the 2 MB full-res set) + tap-to-
  // enlarge (AI_HOTEL_FIELDNOTES_IMAGE_VIEWER_FIX_1).
  // Actions: Copy (client-side) + Dismiss (reuses the #380 discard endpoint).
  const acts=el('div','dlg-acts');
  const copyBtn=el('button','sbtn2','Copy card text');
  copyBtn.onclick=function(){
    const txt=cardAsText(c);
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){copyBtn.textContent='Copied';},function(){copyBtn.textContent='Copy failed';});}
    else{copyBtn.textContent='Clipboard unavailable';}
  };
  acts.appendChild(copyBtn);
  const delBtn=el('button','sbtn2 danger','Delete field note');
  delBtn.onclick=function(){deleteNoteCard(c,delBtn);};
  acts.appendChild(delBtn);
  if(fr&&fr.id&&fr.status!=='discarded'&&noteKey()){
    const disBtn=el('button','sbtn2 danger','Dismiss card');
    disBtn.onclick=function(){
      disBtn.disabled=true;disBtn.textContent='Dismissing…';
      fetch('/api/ai-hotel/form-drafts/'+fr.id+'/discard',{method:'POST',headers:{'X-Baker-Key':noteKey()}})
        .then(function(r){if(!r.ok)throw new Error();disBtn.textContent='Dismissed — reopen Field notes to refresh.';})
        .catch(function(){disBtn.disabled=false;disBtn.textContent='Dismiss failed — try again';});
    };
    acts.appendChild(disBtn);
  }
  b.appendChild(acts);
  document.getElementById('detail').showModal();
}

/* §9 — Vendor & Partner Pipeline (B4 package: each subsection = one vendor) */
function vendorPipelineHook(main,sec){
  const subs=Array.isArray(sec.subsections)?sec.subsections:[];
  if(!subs.length){main.appendChild(el('div','pempty',sec.emptyText||'Vendor pipeline to be filled.'));return;}
  const grid=el('div','rgrid');
  subs.forEach(function(sub){
    const bodyArr=Array.isArray(sub.body)?sub.body:(sub.body?[String(sub.body)]:[]);
    const card=el('div','rcard');card.style.cursor='pointer';
    card.dataset.text=(sub.label+' '+bodyArr.join(' ')+' '+(sub.nextAction||'')+' '+(sub.followUp||'')).toLowerCase();
    const top=el('div','rtop');top.appendChild(iconEl('rti','search'));
    top.appendChild(el('span','rtitle',sub.label||'Vendor'));
    if(sub.rank)top.appendChild(el('span','rstatus '+(sub.rank<=2?'live':'soon'),'#'+sub.rank));
    card.appendChild(top);
    if(sub.nextAction)card.appendChild(el('div','rmeta','Next: '+sub.nextAction));
    card.appendChild(el('div','rdesc',bodyArr[0]||sub.empty||''));
    const foot=el('div','rfoot');const a=el('span','rlink');a.appendChild(el('span',null,'Open detail'));a.appendChild(iconEl('lic','chev'));foot.appendChild(a);card.appendChild(foot);
    card.onclick=function(){openVendorV7(sub);};
    grid.appendChild(card);
  });
  main.appendChild(grid);
}

  const tag=document.getElementById('dlgTag');tag.className='dlg-tag area';tag.textContent='Vendor'+(sub.rank?(' · #'+sub.rank):'');

  const bodyArr=Array.isArray(sub.body)?sub.body:(sub.body?[String(sub.body)]:[]);
  if(bodyArr.length){b.appendChild(el('div','dlg-h','Detail'));const ul=el('ul','exlist');bodyArr.forEach(function(line){if(line)ul.appendChild(el('li',null,String(line)));});b.appendChild(ul);}
  b.appendChild(el('div','dlg-h','Next action'));b.appendChild(el('p',null,sub.nextAction||'—'));
  b.appendChild(el('div','dlg-h','Owner'));
  if(sub.owner)b.appendChild(el('p',null,sub.owner));
  else b.appendChild(el('div','pempty','No Brisen owner assigned yet.'));
  if(sub.followUp){b.appendChild(el('div','dlg-h','Follow-up status'));b.appendChild(el('p',null,sub.followUp));}
  if(Array.isArray(sub.chips)&&sub.chips.length){b.appendChild(el('div','dlg-h','Contacts & links'));b.appendChild(buildChips(sub.chips));}

}

/* §3 — Site thesis derived from the §13 Field-Notes research_findings (no duplication;
   normalizes to owner / zoning-or-parcel / price-or-permits / evidence + links back to §13).
   Auth-gated source: absent/unauthorised/malformed → visible empty-state + link to §13. */
function normalizeSiteFindings(rf){
  const out={owner:'',zoning:'',price:'',permits:'',evidence:''};
  if(!rf||typeof rf!=='object')return out;
  (Array.isArray(rf.answers)?rf.answers:[]).forEach(function(a){
    if(!a)return;const q=(a.q||a.question||'').toLowerCase();const v=(a.a||a.answer||'');if(!v)return;
    if(/owner|seller|landlord|title/.test(q)&&!out.owner)out.owner=v;
    else if(/zoning|parcel|apn|lot|entitl/.test(q)&&!out.zoning)out.zoning=v;
    else if(/price|cost|ask|psf|rent|\$/.test(q)&&!out.price)out.price=v;
    else if(/permit|approval/.test(q)&&!out.permits)out.permits=v;
  });
  out.evidence=[rf.confidence,rf.researched_on?('researched '+rf.researched_on):''].filter(Boolean).join(' · ')||(rf.source||'');
  return out;
}
function buildSiteThesisRow(c){
  const v=(c.form_record&&c.form_record.values)||{};
  const rf=v.research_findings;const n=normalizeSiteFindings(rf);
  const card=el('div','pcard');
  card.appendChild(el('div','plabel',cardName(c)));
  if(rf&&rf.headline)card.appendChild(el('p','ppar',String(rf.headline)));
  [['Owner',n.owner],['Zoning / parcel',n.zoning],['Price / permits',[n.price,n.permits].filter(Boolean).join(' · ')],['Evidence',n.evidence]].forEach(function(p){
    const row=el('div','kv');row.appendChild(el('span','kvk',p[0]));row.appendChild(el('span','kvv',p[1]||'—'));card.appendChild(row);
  });
  const chips=el('div','pchips');const b=el('button','pchip pchip-link','Open in Field Evidence →');b.type='button';b.onclick=function(){show('notes');};chips.appendChild(b);card.appendChild(chips);
  return card;
}
function siteThesisEmpty(sub){
  const w=el('div',null);
  w.appendChild(el('div','pempty',(sub&&sub.empty)||'Site research summary loads from Field Evidence.'));
  const chips=el('div','pchips');const b=el('button','pchip pchip-link','Open Field Evidence (§13) →');b.type='button';b.onclick=function(){show('notes');};chips.appendChild(b);
  w.appendChild(chips);return w;
}
function siteThesisHook(container,sec,sub){
  const ph=el('div','pempty','Loading site research from Field Evidence…');container.appendChild(ph);
  fetch('/api/ai-hotel/captures?limit=100',aiHotelReadOptions())
    .then(function(r){if(!r.ok)throw 0;return r.json();})
    .then(function(d){
      const caps=(d&&Array.isArray(d.captures))?d.captures:[];
      const sites=caps.filter(function(c){const v=c.form_record&&c.form_record.values;return cardKind(c)==='site'&&v&&v.research_findings&&typeof v.research_findings==='object';});
      ph.remove();
      if(!sites.length){container.appendChild(siteThesisEmpty(sub));return;}
      sites.forEach(function(c){container.appendChild(buildSiteThesisRow(c));});
    })
    .catch(function(){ph.remove();container.appendChild(siteThesisEmpty(sub));});
}

function show(id){
  if(!sectionById(id))id='exec';
  current=id;closeMenu();window.scrollTo(0,0);buildNav();
  const main=document.getElementById('main');while(main.firstChild)main.removeChild(main.firstChild);
  const sb=document.getElementById('search');if(sb)sb.value='';
  try{
    if(id==='notes')renderNotes(main);                          // §13 — preserved special hook
    else renderPresentationSection(main,sectionById(id));        // §1-12 — reusable renderer
  }catch(e){
    while(main.firstChild)main.removeChild(main.firstChild);
    main.appendChild(el('div','nempty','This section could not be displayed.'));
  }
}

function doSearch(q){
  q=q.trim().toLowerCase();
  document.querySelectorAll('.pcard,.acard,.rcard,.scard').forEach(function(c){c.classList.toggle('hide',!(!q||(c.dataset.text||'').includes(q)));});
}

const sidebarEl=document.getElementById('sidebar'),scrimEl=document.getElementById('scrim'),menuBtn=document.getElementById('menuBtn');
const drawerMq=window.matchMedia('(max-width:860px)');
function syncDrawerA11y(){
  const hidden=drawerMq.matches&&!sidebarEl.classList.contains('open');
  sidebarEl.toggleAttribute('inert',hidden);
  if(hidden)sidebarEl.setAttribute('aria-hidden','true');else sidebarEl.removeAttribute('aria-hidden');
}
function openMenu(){sidebarEl.classList.add('open');scrimEl.classList.add('show');menuBtn.setAttribute('aria-expanded','true');syncDrawerA11y();}
function closeMenu(){sidebarEl.classList.remove('open');scrimEl.classList.remove('show');menuBtn.setAttribute('aria-expanded','false');syncDrawerA11y();}
menuBtn.onclick=()=>sidebarEl.classList.contains('open')?closeMenu():openMenu();
scrimEl.onclick=closeMenu;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMenu();});
drawerMq.addEventListener('change',syncDrawerA11y);

const rez=document.getElementById('resizer');let dragging=false;
function setW(w){w=Math.min(440,Math.max(190,w));document.documentElement.style.setProperty('--sbw',w+'px');try{localStorage.setItem('aih.sbw',w);}catch(e){}}
rez.addEventListener('mousedown',e=>{dragging=true;rez.classList.add('drag');document.body.style.userSelect='none';e.preventDefault();});
window.addEventListener('mousemove',e=>{if(dragging)setW(e.clientX);});
window.addEventListener('mouseup',()=>{if(dragging){dragging=false;rez.classList.remove('drag');document.body.style.userSelect='';}});
rez.addEventListener('keydown',e=>{const cur=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sbw'))||250;if(e.key==='ArrowLeft'){setW(cur-16);e.preventDefault();}if(e.key==='ArrowRight'){setW(cur+16);e.preventDefault();}});
try{const w=parseInt(localStorage.getItem('aih.sbw'));if(w)document.documentElement.style.setProperty('--sbw',w+'px');}catch(e){}

function setTheme(theme){
  const next=theme==='dark'?'dark':'light';
  document.body.dataset.theme=next;
  document.querySelectorAll('[data-theme-choice]').forEach(btn=>btn.setAttribute('aria-pressed',btn.dataset.themeChoice===next?'true':'false'));
  try{localStorage.setItem('aih.theme',next);}catch(e){}
}
document.querySelectorAll('[data-theme-choice]').forEach(btn=>btn.addEventListener('click',()=>setTheme(btn.dataset.themeChoice)));
try{setTheme(localStorage.getItem('aih.theme')||'light');}catch(e){setTheme('light');}
syncDrawerA11y();

// Field Notes view renders) so a keyed visit persists + strips ?key= even when
// the landing view is the vision page (AC1/AC4 regardless of default section).
// noteKey() is idempotent: after the strip the URL has no key, so later calls
// in renderNotes just read the stored value.
noteKey();
buildNav();show('exec');
