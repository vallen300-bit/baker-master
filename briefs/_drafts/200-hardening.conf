# Baker / KBL-A — SSH hardening drop-in for Mac Mini
# Target path: /etc/ssh/sshd_config.d/200-hardening.conf
# Reference: DECISIONS_PRE_KBL_A_V2_DRAFT.md R1.18, D4
# Ordering: 200 > 100-macos.conf, so these settings win any conflict.

# Disable password-based auth (pubkey only)
PasswordAuthentication no

# Also close the PAM keyboard-interactive side-channel that can still prompt
# for a password even with PasswordAuthentication=no when UsePAM=yes (which
# /etc/ssh/sshd_config.d/100-macos.conf sets).
KbdInteractiveAuthentication no

# No root logins over SSH (stronger than the default `prohibit-password`)
PermitRootLogin no

# Only the Director account can log in
AllowUsers dimitry
